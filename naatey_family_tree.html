<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Naatey Family Tree</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FDF6F0;color:#1A1A2E;overflow:hidden;height:100vh;touch-action:pan-x pan-y}
  .header{background:linear-gradient(135deg,#C0392B,#96281B);color:#fff;padding:12px 16px;text-align:center;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
  .header h1{font-size:17px;font-weight:700}
  .header p{font-size:10px;opacity:.8;margin-top:2px}
  .tree-viewport{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:auto;-webkit-overflow-scrolling:touch;background:#FDF6F0}
  .tree-canvas{position:relative;min-width:800px;min-height:600px;padding:30px 20px 80px}
  .connectors{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
  .conn-pc{stroke:#8B7355;stroke-width:2;fill:none}
  .conn-mar{stroke:#E91E63;stroke-width:2;stroke-dasharray:6,4;fill:none}
  .node{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:10;width:90px;transition:transform .15s}
  .node:active{transform:scale(.93)}
  .node-circle{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.2);flex-shrink:0}
  .node-circle.male{background:#2980B9}
  .node-circle.female{background:#E91E63}
  .node-circle.you-node{background:#C0392B;width:64px;height:64px;border:3px solid #F5C842;box-shadow:0 0 0 4px rgba(245,200,66,.3),0 4px 14px rgba(0,0,0,.25);font-size:12px}
  .node-name{font-size:10px;font-weight:700;text-align:center;margin-top:4px;width:88px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node-relation{font-size:9px;color:#C0392B;font-weight:600;text-align:center;width:88px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node-location{font-size:8px;color:#999;text-align:center;width:88px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .node-married{font-size:7px;color:#E91E63;text-align:center;width:88px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .heart-badge{position:absolute;font-size:10px;z-index:15;background:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15);color:#E91E63}
  .gen-stripe{position:absolute;left:0;right:0;height:22px;background:linear-gradient(90deg,rgba(192,57,43,.08),transparent 60%);border-left:3px solid #C0392B;display:flex;align-items:center;padding-left:10px;z-index:2}
  .gen-stripe span{font-size:10px;font-weight:700;color:#C0392B;background:rgba(253,246,240,.95);padding:1px 8px;border-radius:8px;white-space:nowrap}
  .tree-legend{position:fixed;bottom:16px;left:12px;background:#fff;border-radius:12px;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:50;font-size:9px}
  .legend-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .legend-row:last-child{margin-bottom:0}
  .legend-circle{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .legend-line{width:20px;height:2px;flex-shrink:0}
  .controls{position:fixed;bottom:20px;right:16px;z-index:50}
  .fab{width:50px;height:50px;border-radius:50%;background:#C0392B;color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(192,57,43,.4);display:flex;align-items:center;justify-content:center}
  .overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
  .overlay.active{display:flex}
  .popup{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:300px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.35);animation:pop .25s ease}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .popup-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;margin:0 auto 10px;box-shadow:0 4px 14px rgba(0,0,0,.2)}
  .popup-name{font-size:20px;font-weight:700}
  .popup-relation{font-size:13px;color:#C0392B;font-weight:600;margin:4px 0 14px}
  .popup-row{display:flex;align-items:center;gap:10px;font-size:13px;color:#5A4A3A;padding:6px 0;border-bottom:1px solid #f5f0eb;text-align:left}
  .popup-row:last-of-type{border-bottom:none}
  .popup-icon{font-size:16px;width:24px;text-align:center}
  .popup-close{margin-top:18px;padding:10px 32px;background:#C0392B;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
  .loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FDF6F0;z-index:500;transition:opacity .4s}
  .loading-screen.hidden{opacity:0;pointer-events:none}
  .spinner{width:40px;height:40px;border:4px solid #f0e0d0;border-top-color:#C0392B;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-screen p{margin-top:14px;color:#5A4A3A;font-size:14px}
  .empty-state{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
  .empty-state .emoji{font-size:60px;margin-bottom:16px}
  .empty-state h2{font-size:20px;margin-bottom:8px}
  .empty-state p{font-size:14px;color:#5A4A3A;margin-bottom:20px;line-height:1.5}
  .empty-state button{padding:12px 28px;background:#C0392B;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(192,57,43,.3)}
  .pinch-hint{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:6px 16px;border-radius:20px;font-size:11px;z-index:60;transition:opacity 1s;pointer-events:none}
</style>

<body>
<div class="header"><h1>🌳 My Family Tree</h1><p>Scroll to explore · Tap a person for details</p></div>

<div class="tree-legend">

</div>

// ============================================================
// READS testRelation FIELD (typed by user — reliable)
// READS marriedTo FIELD (for couple matching)
// Falls back to relationship field if testRelation empty
// ============================================================

function classify(rel){
  if(!rel)return{gen:2,g:'u'};
  var r=rel.toLowerCase().trim();

  // Gen 0: Grandparents
  if(r==='dada'||r.indexOf('dada')>=0&&r.indexOf('grand')>=0)return{gen:0,g:'m'};
  if(r==='dadi'||r.indexOf('dadi')>=0&&r.indexOf('grand')>=0)return{gen:0,g:'f'};
  if(r==='nana'||r.indexOf('nana')>=0&&r.indexOf('grand')>=0)return{gen:0,g:'m'};
  if(r==='nani'||r.indexOf('nani')>=0&&r.indexOf('grand')>=0)return{gen:0,g:'f'};
  if(r==='grandfather'||r==='grandpa')return{gen:0,g:'m'};
  if(r==='grandmother'||r==='grandma')return{gen:0,g:'f'};
  // Catch any "grand father" or "grand mother"
  if(r.indexOf('grand')>=0&&(r.indexOf('father')>=0||r.indexOf('pa')>=0))return{gen:0,g:'m'};
  if(r.indexOf('grand')>=0&&(r.indexOf('mother')>=0||r.indexOf('ma')>=0))return{gen:0,g:'f'};

  // Gen 1: Parents & their generation
  if(r==='papa'||r==='father'||r==='pitaji')return{gen:1,g:'m'};
  if(r==='ma'||r==='mother'||r==='maa'||r==='mummy')return{gen:1,g:'f'};
  if(r==='tau'||r==='tauji')return{gen:1,g:'m'};
  if(r==='tai'||r==='taiji')return{gen:1,g:'f'};
  if(r==='chacha'||r==='chachaji')return{gen:1,g:'m'};
  if(r==='chachi'||r==='chachiji')return{gen:1,g:'f'};
  if(r==='bua'||r==='buaji'||r==='phuaji')return{gen:1,g:'f'};
  if(r==='fufa'||r==='fufaji'||r==='phufaji')return{gen:1,g:'m'};
  if(r==='mama'||r==='mamaji')return{gen:1,g:'m'};
  if(r==='mami'||r==='mamiji')return{gen:1,g:'f'};
  if(r==='mausi'||r==='mausiji'||r==='maasi')return{gen:1,g:'f'};
  if(r==='mausa'||r==='mausaji'||r==='maasad')return{gen:1,g:'m'};
  if(r==='sasur'||r==='sasurji')return{gen:1,g:'m'};
  if(r==='saas'||r==='saasji'||r==='sasu')return{gen:1,g:'f'};
  if(r==='uncle')return{gen:1,g:'m'};
  if(r==='aunt'||r==='aunty'||r==='auntie')return{gen:1,g:'f'};

  // Gen 2: You & Siblings
  if(r==='bhaiya'||r==='bhai sahab'||r==='elder brother')return{gen:2,g:'m'};
  if(r==='bhabhi'||r==='bhabhiji')return{gen:2,g:'f'};
  if(r==='didi'||r==='elder sister')return{gen:2,g:'f'};
  if(r==='jija'||r==='jijaji')return{gen:2,g:'m'};
  if(r==='bhai'||r==='younger brother'||r==='brother')return{gen:2,g:'m'};
  if(r==='behen'||r==='younger sister'||r==='sister')return{gen:2,g:'f'};
  if(r==='husband'||r==='pati')return{gen:2,g:'m'};
  if(r==='wife'||r==='patni')return{gen:2,g:'f'};
  if(r==='spouse')return{gen:2,g:'u'};
  if(r==='cousin brother'||r==='cousin bhai')return{gen:2,g:'m'};
  if(r==='cousin sister'||r==='cousin behen')return{gen:2,g:'f'};
  if(r==='cousin')return{gen:2,g:'u'};
  // In-laws at your level
  if(r==='jeth'||r==='jethji')return{gen:2,g:'m'};
  if(r==='jethani')return{gen:2,g:'f'};
  if(r==='dewar'||r==='devarji')return{gen:2,g:'m'};
  if(r==='devrani')return{gen:2,g:'f'};
  if(r==='nanand'||r==='nanad')return{gen:2,g:'f'};
  if(r==='nandoi')return{gen:2,g:'m'};
  if(r==='saali')return{gen:2,g:'f'};
  if(r==='sadhu'||r==='saadhu')return{gen:2,g:'m'};
  if(r==='saala')return{gen:2,g:'m'};
  if(r==='bhai sahab')return{gen:2,g:'m'};
  if(r==='sahlaj')return{gen:2,g:'f'};
  if(r==='behnoi')return{gen:2,g:'m'};

  // Gen 3: Children
  if(r==='beta'||r==='son')return{gen:3,g:'m'};
  if(r==='beti'||r==='daughter')return{gen:3,g:'f'};
  if(r==='bahu'||r==='daughter-in-law'||r==='daughter in law')return{gen:3,g:'f'};
  if(r==='damaad'||r==='son-in-law'||r==='son in law')return{gen:3,g:'m'};

  // Gen 4: Grandchildren
  if(r==='pota'||r==='grandson')return{gen:4,g:'m'};
  if(r==='poti'||r==='granddaughter')return{gen:4,g:'f'};
  if(r==='nati')return{gen:4,g:'m'};
  if(r==='natin')return{gen:4,g:'f'};

  // Skip friends/mentors
  if(r==='friend'||r==='mentor')return{gen:99,g:'u'};
  if(r==='other')return{gen:2,g:'u'};

  // Fallback — try partial matching
  if(r.indexOf('papa')>=0||r.indexOf('father')>=0&&r.indexOf('grand')<0)return{gen:1,g:'m'};
  if(r.indexOf('ma')>=0&&r.indexOf('mama')<0&&r.indexOf('mausi')<0&&r.indexOf('grand')<0&&r.length<8)return{gen:1,g:'f'};
  if(r.indexOf('mother')>=0&&r.indexOf('grand')<0)return{gen:1,g:'f'};
  if(r.indexOf('chacha')>=0)return{gen:1,g:'m'};
  if(r.indexOf('chachi')>=0)return{gen:1,g:'f'};
  if(r.indexOf('mama')>=0)return{gen:1,g:'m'};
  if(r.indexOf('mami')>=0)return{gen:1,g:'f'};
  if(r.indexOf('bua')>=0)return{gen:1,g:'f'};
  if(r.indexOf('fufa')>=0)return{gen:1,g:'m'};
  if(r.indexOf('mausi')>=0)return{gen:1,g:'f'};
  if(r.indexOf('mausa')>=0)return{gen:1,g:'m'};
  if(r.indexOf('sasur')>=0)return{gen:1,g:'m'};
  if(r.indexOf('saas')>=0)return{gen:1,g:'f'};
  if(r.indexOf('bhaiya')>=0)return{gen:2,g:'m'};
  if(r.indexOf('bhabhi')>=0)return{gen:2,g:'f'};
  if(r.indexOf('didi')>=0)return{gen:2,g:'f'};
  if(r.indexOf('jija')>=0)return{gen:2,g:'m'};
  if(r.indexOf('bhai')>=0)return{gen:2,g:'m'};
  if(r.indexOf('behen')>=0)return{gen:2,g:'f'};
  if(r.indexOf('husband')>=0||r.indexOf('pati')>=0)return{gen:2,g:'m'};
  if(r.indexOf('wife')>=0||r.indexOf('patni')>=0)return{gen:2,g:'f'};
  if(r.indexOf('beta')>=0||r.indexOf('son')>=0&&r.indexOf('grand')<0)return{gen:3,g:'m'};
  if(r.indexOf('beti')>=0||r.indexOf('daughter')>=0&&r.indexOf('grand')<0)return{gen:3,g:'f'};
  if(r.indexOf('bahu')>=0)return{gen:3,g:'f'};
  if(r.indexOf('damaad')>=0)return{gen:3,g:'m'};
  if(r.indexOf('pota')>=0||r.indexOf('grandson')>=0)return{gen:4,g:'m'};
  if(r.indexOf('poti')>=0||r.indexOf('granddaughter')>=0)return{gen:4,g:'f'};
  if(r.indexOf('nati')>=0&&r.indexOf('natin')<0)return{gen:4,g:'m'};
  if(r.indexOf('natin')>=0)return{gen:4,g:'f'};

  return{gen:2,g:'u'};
}

function guessGender(name){
  if(!name)return 'm';
  var n=name.toLowerCase();
  var fh=['devi','kumari','bai','amma','priya','anjali','sita','geeta','kavita','sunita','neha','meera','pooja','sneha','nisha','prabha','rekha','lata','seema','anita','shanti','pushpa','savitri','lakshmi','radha','gita'];
  for(var i=0;i<fh.length;i++){if(n.indexOf(fh[i])>=0)return 'f';}
  return 'm';
}

var GEN_LABELS=[
  {gen:0,emoji:'👴👵',title:'Grandparents'},
  {gen:1,emoji:'👨‍👩‍👦',title:'Parents & Relatives'},
  {gen:2,emoji:'⭐',title:'You & Siblings'},
  {gen:3,emoji:'👶',title:'Children'},
  {gen:4,emoji:'🧒',title:'Grandchildren'}
];

var LEVEL_H=160,NODE_W=110,START_Y=40,START_X=20;

function getInitials(n){if(!n)return'?';return n.split(' ').map(function(w){return w[0]}).join('').substring(0,2).toUpperCase()}

async function init(){
  var urlParams=new URLSearchParams(window.location.search);
  var uid=urlParams.get('uid');
  var bonds=[];
  try{
    var q=db.collection('bonds');
    if(uid)q=q.where('userId','==',uid);
    var snap=await q.get();
    snap.forEach(function(d){bonds.push(Object.assign({id:d.id},d.data()))});
  }catch(e){console.error('Firestore error:',e)}

  // *** KEY CHANGE: Read testRelation FIRST, fall back to relationship ***
  var familyBonds=[];
  bonds.forEach(function(b){
    var relField = b.testRelation || b.relationship || '';
    var c=classify(relField);
    b._gen=c.gen;
    b._g=c.g==='u'?guessGender(b.relativename):c.g;
    b._relDisplay=relField;
    if(c.gen<99)familyBonds.push(b);
  });

  if(familyBonds.length===0){showEmpty();}
  else{renderTree(familyBonds);}
  document.getElementById('loader').classList.add('hidden');
}

function showEmpty(){
  document.getElementById('viewport').innerHTML=
    '<div class="empty-state"><div class="emoji">🌳</div>'+
    '<h2>Your Family Tree is Empty</h2>'+
    '<p>Start building your tree by adding<br>your first family member!</p>'+
    '<button onclick="addBond()">+ Add Family Member</button></div>';
}

function renderTree(bonds){
  var canvas=document.getElementById('canvas');
  var svg=document.getElementById('svgLayer');
  var gens={};
  bonds.forEach(function(b){if(!gens[b._gen])gens[b._gen]=[];gens[b._gen].push(b)});
  if(!gens[2])gens[2]=[];
  gens[2].unshift({_isYou:true,relativename:'You',_gen:2,_g:'m',_relDisplay:''});

  var allNodes=[];
  var maxX=0;

  // Position nodes — place couples side by side
  GEN_LABELS.forEach(function(gl){
    var members=gens[gl.gen]||[];
    if(members.length===0)return;
    var y=START_Y+gl.gen*LEVEL_H;

    // Sort: try to place couples together using marriedTo field
    var ordered=[];
    var placed=new Set();

    members.forEach(function(m,i){
      if(placed.has(i))return;
      ordered.push(m);
      placed.add(i);

      // Look for spouse using marriedTo field
      if(m.marriedTo&&m.marriedTo.trim()){
        var spouseName=m.marriedTo.trim().toLowerCase();
        for(var j=0;j<members.length;j++){
          if(placed.has(j))continue;
          if(members[j].relativename&&members[j].relativename.trim().toLowerCase()===spouseName){
            ordered.push(members[j]);
            placed.add(j);
            break;
          }
        }
      }

      // Also check if someone lists THIS person as their marriedTo
      if(!m._isYou){
        var myName=(m.relativename||'').trim().toLowerCase();
        for(var k=0;k<members.length;k++){
          if(placed.has(k))continue;
          if(members[k].marriedTo&&members[k].marriedTo.trim().toLowerCase()===myName){
            ordered.push(members[k]);
            placed.add(k);
            break;
          }
        }
      }
    });

    ordered.forEach(function(m,i){
      var x=START_X+i*NODE_W;
      m._nodeId=m.id||(m.relativename||'')+'_'+gl.gen+'_'+i;
      m._x=x;m._y=y;
      allNodes.push(m);
      if(x+NODE_W>maxX)maxX=x+NODE_W;
    });
  });

  var maxY=START_Y+5*LEVEL_H+40;
  canvas.style.width=(maxX+60)+'px';
  canvas.style.height=maxY+'px';
  svg.setAttribute('width',maxX+60);
  svg.setAttribute('height',maxY);

  var svgHtml='';

  // *** COUPLE MATCHING using marriedTo field ***
  var coupled={};
  allNodes.forEach(function(a){
    if(a._isYou||coupled[a._nodeId])return;
    if(!a.marriedTo||!a.marriedTo.trim())return;
    var spouseName=a.marriedTo.trim().toLowerCase();
    allNodes.forEach(function(b){
      if(b._nodeId===a._nodeId||coupled[b._nodeId])return;
      if(b._isYou){
        // Check if YOU is the spouse
        return;
      }
      var bName=(b.relativename||'').trim().toLowerCase();
      if(bName===spouseName){
        coupled[a._nodeId]=b._nodeId;
        coupled[b._nodeId]=a._nodeId;
        // Draw marriage line
        var ax=a._x+45,bx=b._x+45,y=a._y+27;
        var x1=Math.min(ax,bx)+28,x2=Math.max(ax,bx)-28;
        if(x2>x1){
          svgHtml+='<line class="conn-mar" x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'"/>';
          var hx=(a._x+b._x)/2+38,hy=Math.min(a._y,b._y)+20;
          var heart=document.createElement('div');
          heart.className='heart-badge';heart.textContent='\u2665';
          heart.style.left=hx+'px';heart.style.top=hy+'px';
          canvas.appendChild(heart);
        }
      }
    });
  });

  // Check if YOU has a spouse (wife/husband/patni/pati in testRelation)
  var youNode=allNodes.find(function(n){return n._isYou});
  if(youNode&&!coupled[youNode._nodeId]){
    allNodes.forEach(function(b){
      if(b._isYou||b._gen!==2||coupled[b._nodeId])return;
      var bRel=(b._relDisplay||'').toLowerCase();
      if(bRel==='wife'||bRel==='husband'||bRel==='patni'||bRel==='pati'||bRel==='spouse'||
         bRel.indexOf('wife')>=0||bRel.indexOf('husband')>=0||bRel.indexOf('patni')>=0||bRel.indexOf('pati')>=0){
        coupled[youNode._nodeId]=b._nodeId;
        coupled[b._nodeId]=youNode._nodeId;
        var yx=youNode._x+45,sx=b._x+45,cy=youNode._y+27;
        var lx1=Math.min(yx,sx)+28,lx2=Math.max(yx,sx)-28;
        if(lx2>lx1){
          svgHtml+='<line class="conn-mar" x1="'+lx1+'" y1="'+cy+'" x2="'+lx2+'" y2="'+cy+'"/>';
          var hhx=(youNode._x+b._x)/2+38,hhy=Math.min(youNode._y,b._y)+20;
          var h2=document.createElement('div');h2.className='heart-badge';h2.textContent='\u2665';
          h2.style.left=hhx+'px';h2.style.top=hhy+'px';canvas.appendChild(h2);
        }
      }
    });
  }

  // Parent-child connectors
  [0,1,2,3].forEach(function(pg){
    var parents=gens[pg]||[];
    var children=gens[pg+1]||[];
    if(parents.length===0||children.length===0)return;
    var pmx=0,pc=0;
    parents.forEach(function(p){pmx+=p._x+45;pc++});
    pmx=pmx/pc;
    var pby=START_Y+pg*LEVEL_H+60;
    var cty=START_Y+(pg+1)*LEVEL_H-4;
    var my=pby+(cty-pby)*0.45;
    children.forEach(function(c){
      if(c._isYou)return;
      var cx=c._x+45;
      svgHtml+='<path class="conn-pc" d="M'+pmx+','+pby+' L'+pmx+','+my+' L'+cx+','+my+' L'+cx+','+cty+'"/>';
    });
  });

  svg.innerHTML=svgHtml;

  // Generation labels
  GEN_LABELS.forEach(function(gl){
    var members=gens[gl.gen]||[];
    if(members.length===0&&gl.gen!==2)return;
    var stripe=document.createElement('div');
    stripe.className='gen-stripe';
    stripe.style.top=(START_Y+gl.gen*LEVEL_H-28)+'px';
    stripe.innerHTML='<span>'+gl.emoji+' '+gl.title+'</span>';
    canvas.appendChild(stripe);
  });

  // Person nodes
  allNodes.forEach(function(m){
    var node=document.createElement('div');
    node.className='node';
    node.style.left=m._x+'px';node.style.top=m._y+'px';
    node.onclick=function(){showPopup(m)};
    var isYou=m._isYou;
    var cc=isYou?'you-node':(m._g==='f'?'female':'male');
    var dn=m.relativename||'?';
    var dr=m._relDisplay||'';
    node.innerHTML=
      '<div class="node-circle '+cc+'">'+(isYou?'\u2605YOU':getInitials(dn))+'</div>'+
      '<div class="node-name">'+dn+'</div>'+
      (dr?'<div class="node-relation">'+dr+'</div>':'')+
      (m.location?'<div class="node-location">\uD83D\uDCCD '+m.location+'</div>':'')+
      (m.marriedTo?'<div class="node-married">\u2665 '+m.marriedTo+'</div>':'');
    canvas.appendChild(node);
  });
}

function showPopup(p){
  if(p._isYou)return;
  document.getElementById('pAvatar').style.background=p._g==='f'?'#E91E63':'#2980B9';
  document.getElementById('pAvatar').textContent=getInitials(p.relativename||'');
  document.getElementById('pName').textContent=p.relativename||'';
  document.getElementById('pRelation').textContent=p._relDisplay||'';
  var rows='';
  if(p.profession)rows+='<div class="popup-row"><span class="popup-icon">\uD83D\uDCBC</span>'+p.profession+'</div>';
  if(p.location)rows+='<div class="popup-row"><span class="popup-icon">\uD83D\uDCCD</span>'+p.location+'</div>';
  if(p.relativePhone)rows+='<div class="popup-row"><span class="popup-icon">\uD83D\uDCDE</span>'+p.relativePhone+'</div>';
  if(p.marriedTo)rows+='<div class="popup-row"><span class="popup-icon">\u2665</span>Married to: '+p.marriedTo+'</div>';
  if(!rows)rows='<div class="popup-row" style="justify-content:center;color:#bbb">No details added yet</div>';
  document.getElementById('pRows').innerHTML=rows;
  document.getElementById('overlay').classList.add('active');
}

function closePopup(){document.getElementById('overlay').classList.remove('active')}
function addBond(){alert('Navigate to Add Bond page')}

init();
setTimeout(function(){var h=document.getElementById('hint');if(h){h.style.opacity='0';setTimeout(function(){h.style.display='none'},1000)}},3000);
</script>
