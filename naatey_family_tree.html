function classify(rel){
  if(!rel)return{gen:2,g:'u'};
  var r=rel.toLowerCase().trim();
  // Remove brackets content for simpler matching e.g. "Grand father (Dada)" -> "grand father"
  var rclean=r.replace(/\s*\([^)]*\)/g,'').trim();
  
  // Gen 0: Grandparents - check both full and clean versions
  if(r==='dada'||rclean==='grand father'&&r.indexOf('dada')>=0||r.indexOf('grand father (dada)')>=0||r.indexOf('grandfather (dada)')>=0)return{gen:0,g:'m'};
  if(r==='dadi'||rclean==='grand mother'&&r.indexOf('dadi')>=0||r.indexOf('grand mother (dadi)')>=0||r.indexOf('grandmother (dadi)')>=0)return{gen:0,g:'f'};
  if(r==='nana'||rclean==='grand father'&&r.indexOf('nana')>=0||r.indexOf('grand father (nana)')>=0||r.indexOf('grandfather (nana)')>=0)return{gen:0,g:'m'};
  if(r==='nani'||rclean==='grand mother'&&r.indexOf('nani')>=0||r.indexOf('grand mother (nani)')>=0||r.indexOf('grandmother (nani)')>=0)return{gen:0,g:'f'};
  if(r==='grandfather'||r==='grandpa')return{gen:0,g:'m'};
  if(r==='grandmother'||r==='grandma')return{gen:0,g:'f'};
  if(r.indexOf('grand')>=0&&(r.indexOf('father')>=0||r.indexOf('pa')>=0)&&r.indexOf('son')<0&&r.indexOf('daughter')<0)return{gen:0,g:'m'};
  if(r.indexOf('grand')>=0&&(r.indexOf('mother')>=0||r.indexOf('ma')>=0)&&r.indexOf('son')<0&&r.indexOf('daughter')<0)return{gen:0,g:'f'};
  if(r==='papa'||r.indexOf('father (papa)')>=0||r==='father')return{gen:1,g:'m'};
  if(r==='ma'||r.indexOf('mother (ma)')>=0||r==='mother'||r==='maa'||r==='mummy')return{gen:1,g:'f'};

  if(r==='mama'||r.indexOf('mama')>=0&&r.indexOf('grand')<0)return{gen:1,g:'m'};
  if(r==='mami'||r.indexOf('mami')>=0)return{gen:1,g:'f'};

  if(r==='sasur'||r==='sasurji')return{gen:1,g:'m'};

  if(r.indexOf('father')>=0&&r.indexOf('grand')<0&&r.indexOf('in-law')<0&&r.indexOf('in law')<0)return{gen:1,g:'m'};
  if(r.indexOf('mother')>=0&&r.indexOf('grand')<0&&r.indexOf('in-law')<0&&r.indexOf('in law')<0)return{gen:1,g:'f'};

  if(r==='beta'||r.indexOf('son (beta)')>=0||r==='son')return{gen:3,g:'m'};
  if(r==='beti'||r.indexOf('daughter (beti)')>=0||r==='daughter')return{gen:3,g:'f'};
  if(r==='bahu'||r.indexOf('bahu')>=0||r.indexOf('daughter-in-law')>=0||r.indexOf('daughter in law')>=0)return{gen:3,g:'f'};
  if(r==='damaad'||r.indexOf('damaad')>=0||r.indexOf('son-in-law')>=0||r.indexOf('son in law')>=0)return{gen:3,g:'m'};
  if(r==='pota'||r.indexOf('grandson (pota)')>=0||r==='grandson')return{gen:4,g:'m'};
  if(r==='poti'||r.indexOf('granddaughter (poti)')>=0||r==='granddaughter')return{gen:4,g:'f'};
  if(r==='nati'||r.indexOf("daughter's son (nati)")>=0)return{gen:4,g:'m'};
  if(r==='natin'||r.indexOf("daughter's daughter (natin)")>=0)return{gen:4,g:'f'};
  if(r==='friend'||r==='mentor'||r.indexOf('friend')>=0||r.indexOf('mentor')>=0)return{gen:99,g:'u'};

  // partial fallbacks
  if(r.indexOf('dada')>=0)return{gen:0,g:'m'};
  if(r.indexOf('dadi')>=0)return{gen:0,g:'f'};
  if(r.indexOf('nana')>=0&&r.indexOf('nand')<0)return{gen:0,g:'m'};
  if(r.indexOf('nani')>=0)return{gen:0,g:'f'};
  if(r.indexOf('chacha')>=0)return{gen:1,g:'m'};
  if(r.indexOf('chachi')>=0)return{gen:1,g:'f'};
  if(r.indexOf('mama')>=0)return{gen:1,g:'m'};
  if(r.indexOf('mami')>=0)return{gen:1,g:'f'};
  if(r.indexOf('bua')>=0)return{gen:1,g:'f'};
  if(r.indexOf('fufa')>=0)return{gen:1,g:'m'};
  if(r.indexOf('mausi')>=0)return{gen:1,g:'f'};
  if(r.indexOf('mausa')>=0)return{gen:1,g:'m'};
  if(r.indexOf('bhaiya')>=0)return{gen:2,g:'m'};
  if(r.indexOf('bhabhi')>=0)return{gen:2,g:'f'};
  if(r.indexOf('didi')>=0)return{gen:2,g:'f'};
  if(r.indexOf('jija')>=0)return{gen:2,g:'m'};
  if(r.indexOf('bhai')>=0)return{gen:2,g:'m'};
  if(r.indexOf('behen')>=0)return{gen:2,g:'f'};
  if(r.indexOf('husband')>=0||r.indexOf('pati')>=0)return{gen:2,g:'m'};
  if(r.indexOf('wife')>=0||r.indexOf('patni')>=0)return{gen:2,g:'f'};
  if(r.indexOf('beta')>=0)return{gen:3,g:'m'};
  if(r.indexOf('beti')>=0)return{gen:3,g:'f'};
  if(r.indexOf('bahu')>=0)return{gen:3,g:'f'};
  if(r.indexOf('damaad')>=0)return{gen:3,g:'m'};

function guessGender(name){
  if(!name)return 'm';
  var n=name.toLowerCase();
  var fh=['devi','kumari','bai','amma','priya','anjali','sita','geeta','kavita','sunita','neha','meera','pooja','sneha','nisha','prabha','rekha','lata','seema','anita','shanti','pushpa','savitri','lakshmi','radha','gita'];
  for(var i=0;i<fh.length;i++){if(n.indexOf(fh[i])>=0)return 'f';}
  return 'm';
}

// ============================================================
// AUTO-LINK RULES
// For each relationship, which relationship(s) are its natural parent?
// Returns array of candidate parent relationship keywords (in priority order).
// When multiple bonds match (e.g. two Betas), we pick the first found —
// ambiguous cases like Pota with two Betas still work, just picks one.
// ============================================================
var AUTO_PARENT_RULES = [
  // Gen 1 → Gen 0 parents
  { child: ['father (papa)','papa','father'],          parents: ['grand father (dada)','dada'] },
  { child: ['mother (ma)','ma','mother','maa','mummy'],parents: ['grand father (nana)','nana'] },
  { child: ['father\'s elder brother (tau)','tau'],    parents: ['grand father (dada)','dada'] },
  { child: ['father\'s elder brother\'s wife (tai)','tai'], parents: ['grand father (dada)','dada'] },
  { child: ['father\'s younger brother (chacha)','chacha'], parents: ['grand father (dada)','dada'] },
  { child: ['father\'s younger brother\'s wife (chachi)','chachi'], parents: ['grand father (dada)','dada'] },
  { child: ['father\'s sister (bua)','bua'],           parents: ['grand father (dada)','dada'] },
  { child: ['father\'s sister\'s husband (fufa)','fufa'], parents: ['grand father (dada)','dada'] },
  { child: ['mother\'s brother (mama)','mama'],        parents: ['grand father (nana)','nana'] },
  { child: ['mother\'s brother\'s wife (mami)','mami'],parents: ['grand father (nana)','nana'] },
  { child: ['mother\'s sister (mausi)','mausi'],       parents: ['grand father (nana)','nana'] },
  { child: ['mother\'s sister\'s husband (mausa)','mausa'], parents: ['grand father (nana)','nana'] },
  // Spouse-side Gen 1 → spouse's parents (sasur/saas are your spouse's parents — no auto-link up, place independently)

  // Gen 2 → Gen 1 parents
  { child: ['elder brother (bhaiya)','bhaiya','younger brother (bhai)','bhai',
            'elder sister (didi)','didi','younger sister (behen)','behen','cousin'],
            parents: ['father (papa)','papa','father'] },
  { child: ['elder brother\'s wife (bhabhi)','bhabhi'],
            parents: ['elder brother (bhaiya)','bhaiya'] },
  { child: ['elder sister\'s husband (jija)','jija'],
            parents: ['elder sister (didi)','didi'] },

  // Gen 3 → Gen 2 (You or sibling)
  { child: ['son (beta)','beta','son','daughter (beti)','beti','daughter'],
            parents: ['__you__'] },  // special token = You node
  { child: ['daughter-in-law (bahu)','bahu'],
            parents: ['son (beta)','beta','son'] },
  { child: ['son-in-law (damaad)','damaad'],
            parents: ['daughter (beti)','beti','daughter'] },

  // Gen 4 → Gen 3
  { child: ['grandson (pota)','pota','granddaughter (poti)','poti'],
            parents: ['son (beta)','beta','son'] },
  { child: ["daughter's son (nati)",'nati',"daughter's daughter (natin)",'natin'],
            parents: ['daughter (beti)','beti','daughter'] },
];

// ============================================================
// AUTO-LINK ENGINE
// Finds the best parent bond for a given child bond automatically.
// Uses parentBondId if already set (manual override / future FlutterFlow).
// Falls back to AUTO_PARENT_RULES for all existing data.
// ============================================================
function autoLink(bonds){
  // Build lookup: normalised relationship → list of bonds with that rel
  var relIndex = {};
  var YOU_ID = '__you__';

  bonds.forEach(function(b){
    if(b._isYou) return;
    var r = (b._relDisplay||'').toLowerCase().trim();
    if(!relIndex[r]) relIndex[r] = [];
    relIndex[r].push(b);
  });

  // Helper: find first bond matching any of the given keywords
  function findParent(keywords){
    for(var i=0;i<keywords.length;i++){
      var kw = keywords[i].toLowerCase();
      if(kw === '__you__') return {id: YOU_ID, _isYou: true};
      // Exact match first
      if(relIndex[kw] && relIndex[kw].length>0) return relIndex[kw][0];
      // Partial match fallback
      var keys = Object.keys(relIndex);
      for(var j=0;j<keys.length;j++){
        if(keys[j].indexOf(kw)>=0 && relIndex[keys[j]].length>0)
          return relIndex[keys[j]][0];
      }
    }
    return null;
  }

  bonds.forEach(function(b){
    if(b._isYou) return;
    // If parentBondId already explicitly set in Firestore, respect it
    if(b.parentBondId) return;

    var r = (b._relDisplay||'').toLowerCase().trim();

    // Try each rule
    for(var i=0;i<AUTO_PARENT_RULES.length;i++){
      var rule = AUTO_PARENT_RULES[i];
      var matched = false;
      for(var j=0;j<rule.child.length;j++){
        if(r === rule.child[j].toLowerCase() || r.indexOf(rule.child[j].toLowerCase())>=0){
          matched = true; break;
        }
      }
      if(matched){
        var parent = findParent(rule.parents);
        if(parent) { b._autoParentId = parent.id; }
        break;
      }
    }
  });
}

// ============================================================
// BRANCH ASSIGNMENT (for layout zones)
// Paternal = Papa's side, Maternal = Ma's side
// ============================================================
function assignBranches(bonds){
  // First pass: assign branch to root-level relations (grandparents, direct parents)
  // Check MATERNAL first (more specific), then PATERNAL, then SPOUSE
  // This prevents Mama/Mami/Mausi/Mausa from being caught by paternal checks
  var MATERNAL_RELS = ['nana','nani','grand father (nana)','grand mother (nani)',
    "mother's brother",'mama','mami',"mother's sister",'mausi','mausa'];
  var PATERNAL_RELS = ['dada','dadi','grand father (dada)','grand mother (dadi)',
    "father's elder brother",'tau','tai',
    "father's younger brother",'chacha','chachi',
    "father's sister",'bua','fufa',
    'father (papa)','papa'];
  var SPOUSE_RELS   = ['sasur','saas','jeth','jethani','dewar','devrani',
    'nanand','nandoi','saali','saala','sadhu','behnoi',
    'husband (pati)','wife (patni)','pati','patni','spouse'];
  // Papa/Ma/Father/Mother go under 'self' so they sit between paternal & maternal
  var SELF_PARENT_RELS = ['father (papa)','mother (ma)','papa','ma','father','mother','maa','mummy'];

  bonds.forEach(function(b){
    if(b._isYou){ b._branch='self'; return; }
    var r=(b._relDisplay||'').toLowerCase().trim();
    // Check in priority order: self-parents, maternal, paternal, spouse
    var isSelfParent = SELF_PARENT_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    var isMat = MATERNAL_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    var isPat = PATERNAL_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    var isSp  = SPOUSE_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    if(isSelfParent) b._branch='self';
    else if(isMat) b._branch='maternal';
    else if(isPat) b._branch='paternal';
    else if(isSp) b._branch='spouse';
    else b._branch='self';
  });

  // Second pass: propagate branch from parent → children (auto-linked or manual)
  // Children inherit their parent's branch so Chacha's children stay on paternal side
  var bondMap={};
  bonds.forEach(function(b){ bondMap[b.id]=b; });

  for(var pass=0;pass<6;pass++){
    bonds.forEach(function(b){
      if(b._isYou) return;
      var pid = b.parentBondId || b._autoParentId;
      if(!pid || pid==='__you__') return;
      var parent = bondMap[pid];
      if(parent && parent._branch && !b._branchLocked){
        b._branch = parent._branch;
        b._branchLocked = true; // don't overwrite once inherited
      }
    });
  }

  // Final fallback
  bonds.forEach(function(b){
    if(!b._branch) b._branch='self';
  });
}

var GEN_LABELS=[
  {gen:0,emoji:'👴👵',title:'Grandparents'},
  {gen:1,emoji:'👨‍👩‍👦',title:'Parents & Relatives'},
  {gen:2,emoji:'⭐',title:'You & Siblings'},
  {gen:3,emoji:'👶',title:'Children'},
  {gen:4,emoji:'🧒',title:'Grandchildren'}
];

var LEVEL_H=160,NODE_W=110,START_Y=40,BRANCH_GAP=50;

function getInitials(n){
  if(!n)return'?';
  return n.split(' ').map(function(w){return w[0]||''}).join('').substring(0,2).toUpperCase();
}

// MAIN INIT
// ============================================================
async function init(){
  var urlParams=new URLSearchParams(window.location.search);
  var uid=urlParams.get('uid');
  var bonds=[];
  try{
    var q=db.collection('bonds');
    if(uid)q=q.where('userId','==',uid);
    var snap=await q.get();
    snap.forEach(function(d){bonds.push(Object.assign({id:d.id},d.data()))});
  }catch(e){console.error('Firestore error:',e)}

  var familyBonds=[];
  var friendBonds=[];
  bonds.forEach(function(b){
    var relField=b.relationship||b.testRelation||'';
    var c=classify(relField);
    console.log('Bond:', b.relativename, '| rel:', relField, '| gen:', c.gen, '| gender:', c.g);
    b._gen=c.gen;
    b._g=c.g==='u'?guessGender(b.relativename):c.g;
    b._relDisplay=relField;
    if(c.gen<99) familyBonds.push(b);
    else friendBonds.push(b); // Friends & Mentors go to separate section
  });

  if(familyBonds.length===0 && friendBonds.length===0){showEmpty();return;}

  if(familyBonds.length>0){
    // Insert YOU node
    var youNode={_isYou:true,id:'__you__',relativename:'You',_gen:2,_g:'m',_relDisplay:'',_branch:'self'};
    familyBonds.unshift(youNode);

    // Auto-link: assign _autoParentId based on relationship rules
    autoLink(familyBonds);

    // Assign branches (paternal/maternal/self/spouse)
    assignBranches(familyBonds);

    renderTree(familyBonds);
  } else {
    showEmpty(true); // show empty family state but still render friends below
  }

  renderFriends(friendBonds);
  document.getElementById('loader').classList.add('hidden');
}

function renderFriends(friends){
  var existing=document.getElementById('friendsSection');
  if(existing) existing.remove();

  if(!friends || friends.length===0) return;

  var canvas=document.getElementById('canvas');
  var section=document.createElement('div');
  section.id='friendsSection';
  section.className='friends-section';

  var header=document.createElement('div');
  header.className='friends-header';
  header.innerHTML='\uD83D\uDC6B Friends & Mentors';
  section.appendChild(header);

  var row=document.createElement('div');
  row.className='friends-row';

  friends.forEach(function(f){
    var g = guessGender(f.relativename);
    var card=document.createElement('div');
    card.className='friend-card';
    card.onclick=function(){showPopup(Object.assign({},f,{_g:g}));};
    var isMentor=(f._relDisplay||'').toLowerCase().indexOf('mentor')>=0;
    card.innerHTML=
      '<div class="friend-circle '+(g==='f'?'female':'male')+'">'+getInitials(f.relativename||'?')+'</div>'+
      '<div class="friend-name">'+(f.relativename||'?')+'</div>'+
      '<div class="friend-tag">'+(isMentor?'\uD83C\uDF93 Mentor':'\uD83D\uDC6B Friend')+'</div>'+
      (f.location?'<div class="friend-location">\uD83D\uDCCD '+f.location+'</div>':'');
    row.appendChild(card);
  });

  section.appendChild(row);

  // Append below the tree canvas, inside the scrollable viewport
  var viewport=document.getElementById('viewport');
  viewport.appendChild(section);
}

// ============================================================
// RENDER TREE
// ============================================================
function renderTree(bonds){
  var canvas=document.getElementById('canvas');
  var svg=document.getElementById('svgLayer');

  // Group by generation
  var gens={};
  bonds.forEach(function(b){
    if(!gens[b._gen])gens[b._gen]=[];
    gens[b._gen].push(b);
  });
  if(!gens[2])gens[2]=[];

  var BRANCH_ORDER=['paternal','self','spouse','maternal'];
  var allNodes=[];
  var maxX=0;

  // Sort couples within a group — keeps Beta+Bahu together, Beti+Damaad together
  // Also sorts: male first then female spouse beside them
  function sortCouples(arr){
    var ordered=[];
    var placed=new Set();
    // First pass: place males with their spouses
    arr.forEach(function(m,i){
      if(placed.has(i))return;
      if(m._g==='f'&&!m._isYou)return; // skip females first pass
      ordered.push(m);placed.add(i);
      // Find spouse by marriedTo name
      if(m.marriedTo&&m.marriedTo.trim()){
        var sn=m.marriedTo.trim().toLowerCase();
        for(var j=0;j<arr.length;j++){
          if(placed.has(j))continue;
          if((arr[j].relativename||'').trim().toLowerCase()===sn){
            ordered.push(arr[j]);placed.add(j);break;
          }
        }
      }
      // Find spouse by reverse marriedTo
      if(!m._isYou){
        var myN=(m.relativename||'').trim().toLowerCase();
        for(var k=0;k<arr.length;k++){
          if(placed.has(k))continue;
          if(arr[k].marriedTo&&arr[k].marriedTo.trim().toLowerCase()===myN){
            ordered.push(arr[k]);placed.add(k);break;
          }
        }
      }
    });
    // Second pass: any remaining unplaced (females without male counterpart)
    arr.forEach(function(m,i){
      if(!placed.has(i)){ordered.push(m);placed.add(i);}
    });
    return ordered;
  }

  // Layout: per generation, place nodes in branch zones left→right
  GEN_LABELS.forEach(function(gl){
    var members=gens[gl.gen]||[];
    if(members.length===0)return;
    var y=START_Y+gl.gen*LEVEL_H;

    // Group by branch
    var branchGroups={paternal:[],self:[],spouse:[],maternal:[]};
    members.forEach(function(m){
      var br=m._branch||'self';
      if(!branchGroups[br])branchGroups[br]=[];
      branchGroups[br].push(m);
    });

    var curX=20;
    BRANCH_ORDER.forEach(function(br){
      var group=sortCouples(branchGroups[br]||[]);
      if(group.length===0)return;
      group.forEach(function(m){
        m._nodeId=m.id||(m.relativename||'')+'_'+gl.gen;
        m._x=curX;m._y=y;
        allNodes.push(m);
        curX+=NODE_W;
        if(curX>maxX)maxX=curX;
      });
      curX+=BRANCH_GAP;
    });
  });

  var maxY=START_Y+5*LEVEL_H+40;
  canvas.style.width=(maxX+60)+'px';
  canvas.style.height=maxY+'px';
  svg.setAttribute('width',maxX+60);
  svg.setAttribute('height',maxY);

  var svgHtml='';

  // Build nodeById lookup
  var nodeById={};
  allNodes.forEach(function(n){if(n.id)nodeById[n.id]=n;});

  // ============================================================
  // MARRIAGE CONNECTORS
  // ============================================================
  var coupled={};
  allNodes.forEach(function(a){
    if(a._isYou||coupled[a._nodeId])return;
    if(!a.marriedTo||!a.marriedTo.trim())return;
    var sn=a.marriedTo.trim().toLowerCase();
    allNodes.forEach(function(b){
      if(b._nodeId===a._nodeId||coupled[b._nodeId]||b._isYou)return;
      if((b.relativename||'').trim().toLowerCase()===sn){
        coupled[a._nodeId]=b._nodeId;coupled[b._nodeId]=a._nodeId;
        var ax=a._x+45,bx=b._x+45,y=a._y+27;
        var x1=Math.min(ax,bx)+28,x2=Math.max(ax,bx)-28;
        if(x2>x1){
          svgHtml+='<line class="conn-mar" x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'"/>';
          var hx=(a._x+b._x)/2+38,hy=Math.min(a._y,b._y)+20;
          var heart=document.createElement('div');heart.className='heart-badge';heart.textContent='\u2665';
          heart.style.left=hx+'px';heart.style.top=hy+'px';canvas.appendChild(heart);
        }
      }
    });
  });

  // YOU + spouse by relationship label fallback
  var youEl=allNodes.find(function(n){return n._isYou;});
  if(youEl&&!coupled[youEl._nodeId]){
    allNodes.forEach(function(b){
      if(b._isYou||b._gen!==2||coupled[b._nodeId])return;
      var bRel=(b._relDisplay||'').toLowerCase();
      if(bRel.indexOf('wife')>=0||bRel.indexOf('husband')>=0||bRel.indexOf('patni')>=0||bRel.indexOf('pati')>=0||bRel==='spouse'){
        coupled[youEl._nodeId]=b._nodeId;coupled[b._nodeId]=youEl._nodeId;
        var yx=youEl._x+45,sx=b._x+45,cy=youEl._y+27;
        var lx1=Math.min(yx,sx)+28,lx2=Math.max(yx,sx)-28;
        if(lx2>lx1){
          svgHtml+='<line class="conn-mar" x1="'+lx1+'" y1="'+cy+'" x2="'+lx2+'" y2="'+cy+'"/>';
          var hhx=(youEl._x+b._x)/2+38,hhy=Math.min(youEl._y,b._y)+20;
          var h2=document.createElement('div');h2.className='heart-badge';h2.textContent='\u2665';
          h2.style.left=hhx+'px';h2.style.top=hhy+'px';canvas.appendChild(h2);
        }
      }
    });
  }

  // ============================================================
  // PARENT-CHILD CONNECTORS
  // Priority 1: explicit parentBondId (manual, future-proof)
  // Priority 2: _autoParentId (computed by autoLink())
  // Priority 3: branch-grouped generation fallback
  // ============================================================
  var drawnDirectly=new Set();

  allNodes.forEach(function(child){
    if(child._isYou)return;
    var pid=child.parentBondId||child._autoParentId;
    if(!pid)return;

    var parent = pid==='__you__' ? youEl : nodeById[pid];
    if(!parent)return;

    drawnDirectly.add(child._nodeId);
    var px=parent._x+45, py=parent._y+60;
    var cx=child._x+45, cy=child._y-4;
    var my=py+(cy-py)*0.45;
    svgHtml+='<path class="conn-pc" d="M'+px+','+py+' L'+px+','+my+' L'+cx+','+my+' L'+cx+','+cy+'"/>';
  });

  // Fallback connectors for nodes with no parent resolved
  // Skip Gen 0 entirely — grandparents are roots, no parent above them
  // For Gen 1+, only connect within SAME branch to avoid cross-branch lines
  [1,2,3].forEach(function(pg){
    var parents=(gens[pg]||[]).filter(function(p){return !p._isYou;});
    var children=(gens[pg+1]||[]).filter(function(c){
      return !c._isYou&&!drawnDirectly.has(c._nodeId);
    });
    if(parents.length===0||children.length===0)return;

    var branchParents={};
    parents.forEach(function(p){
      var br=p._branch||'self';
      if(!branchParents[br])branchParents[br]=[];
      branchParents[br].push(p);
    });
    var branchChildren={};
    children.forEach(function(c){
      var br=c._branch||'self';
      if(!branchChildren[br])branchChildren[br]=[];
      branchChildren[br].push(c);
    });

    Object.keys(branchParents).forEach(function(br){
      var bP=branchParents[br]||[];
      var bC=branchChildren[br]||[];
      if(bP.length===0||bC.length===0)return;
      // Only draw if branches match exactly — no cross-branch lines
      if(!branchChildren[br]||branchChildren[br].length===0)return;
      var pmx=0,pc=0;
      bP.forEach(function(p){pmx+=p._x+45;pc++;});
      pmx=pmx/pc;
      var pby=START_Y+pg*LEVEL_H+60;
      var cty=START_Y+(pg+1)*LEVEL_H-4;
      var my=pby+(cty-pby)*0.45;
      bC.forEach(function(c){
        // Double check branch matches before drawing
        if((c._branch||'self')===br){
          svgHtml+='<path class="conn-pc" d="M'+pmx+','+pby+' L'+pmx+','+my+' L'+(c._x+45)+','+my+' L'+(c._x+45)+','+cty+'"/>';
        }
      });
    });
  });

  svg.innerHTML=svgHtml;

  // Generation stripe labels
  GEN_LABELS.forEach(function(gl){
    var members=gens[gl.gen]||[];
    if(members.length===0&&gl.gen!==2)return;
    var stripe=document.createElement('div');stripe.className='gen-stripe';
    stripe.style.top=(START_Y+gl.gen*LEVEL_H-28)+'px';
    stripe.innerHTML='<span>'+gl.emoji+' '+gl.title+'</span>';
    canvas.appendChild(stripe);
  });

  // Branch labels above Gen 0 if both sides present
  var gen0=allNodes.filter(function(n){return n._gen===0;});
  var patG0=gen0.filter(function(n){return n._branch==='paternal';});
  var matG0=gen0.filter(function(n){return n._branch==='maternal';});
  if(patG0.length){
    var bl=document.createElement('div');bl.className='branch-label';
    bl.textContent="Papa's side 🏠";
    bl.style.left=patG0[0]._x+'px';
    bl.style.top=(START_Y+0*LEVEL_H-46)+'px';
    canvas.appendChild(bl);
  }
  if(matG0.length){
    var bl2=document.createElement('div');bl2.className='branch-label';
    bl2.textContent="Mama's side 🏠";
    bl2.style.left=matG0[0]._x+'px';
    bl2.style.top=(START_Y+0*LEVEL_H-46)+'px';
    canvas.appendChild(bl2);
  }

  // Draw person nodes
  allNodes.forEach(function(m){
    var node=document.createElement('div');node.className='node';
    node.style.left=m._x+'px';node.style.top=m._y+'px';
    node.onclick=function(){showPopup(m);};
    var isYou=m._isYou;
    var cc=isYou?'you-node':(m._g==='f'?'female':'male');
    var dn=m.relativename||'?';
    var dr=m._relDisplay||'';
    node.innerHTML=
      '<div class="node-circle '+cc+'">'+(isYou?'\u2605YOU':getInitials(dn))+'</div>'+
      '<div class="node-name">'+dn+'</div>'+
      (dr?'<div class="node-relation">'+dr+'</div>':'')+
      (m.location?'<div class="node-location">\uD83D\uDCCD '+m.location+'</div>':'')+
      (m.marriedTo?'<div class="node-married">\u2665 '+m.marriedTo+'</div>':'');
    canvas.appendChild(node);
  });
}

// ============================================================
// DRAGGABLE LEGEND
// Supports both touch (mobile) and mouse (desktop/testing)
// ============================================================
(function(){
  var el=document.getElementById('legend');
  var dragging=false,startX,startY,origLeft,origTop;

  function getPos(e){
    if(e.touches) return{x:e.touches[0].clientX,y:e.touches[0].clientY};
    return{x:e.clientX,y:e.clientY};
  }
  function onStart(e){
    dragging=true;
    var pos=getPos(e);
    var rect=el.getBoundingClientRect();
    startX=pos.x; startY=pos.y;
    origLeft=rect.left; origTop=rect.top;
    el.style.bottom='auto'; el.style.right='auto';
    el.style.left=origLeft+'px'; el.style.top=origTop+'px';
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    var pos=getPos(e);
    var dx=pos.x-startX, dy=pos.y-startY;
    var newLeft=origLeft+dx, newTop=origTop+dy;
    // Keep within viewport
    newLeft=Math.max(4,Math.min(window.innerWidth-el.offsetWidth-4,newLeft));
    newTop=Math.max(56,Math.min(window.innerHeight-el.offsetHeight-4,newTop));
    el.style.left=newLeft+'px'; el.style.top=newTop+'px';
    e.preventDefault();
  }
  function onEnd(){ dragging=false; }

  el.addEventListener('touchstart',onStart,{passive:false});
  el.addEventListener('touchmove',onMove,{passive:false});
  el.addEventListener('touchend',onEnd);
  el.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
})();
