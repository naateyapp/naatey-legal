// ============================================================
// CLASSIFY: generation + gender from relationship label
// ============================================================
function classify(rel){
  if(!rel)return{gen:2,g:'u'};
  // Normalize: lowercase, trim, remove extra spaces
  var r=rel.toLowerCase().trim().replace(/\s+/g,' ');
  
  // Extract keywords from the relationship string
  // This handles formats like "Grand father (Dada)", "Father (Papa)", "Father's Younger Brother (Chacha)"
  
  // ============ GEN 0: GRANDPARENTS ============
  // Paternal grandparents
  if(r.indexOf('dada')>=0&&r.indexOf('nana')<0&&r.indexOf('grand')>=0)return{gen:0,g:'m'};
  if(r.indexOf('dadi')>=0&&r.indexOf('grand')>=0)return{gen:0,g:'f'};
  if(r==='dada')return{gen:0,g:'m'};
  if(r==='dadi')return{gen:0,g:'f'};
  // Maternal grandparents  
  if(r.indexOf('nana')>=0&&r.indexOf('grand')>=0&&r.indexOf('nand')<0)return{gen:0,g:'m'};
  if(r.indexOf('nani')>=0&&r.indexOf('grand')>=0)return{gen:0,g:'f'};
  if(r==='nana')return{gen:0,g:'m'};
  if(r==='nani')return{gen:0,g:'f'};
  // Generic grandparents
  if(r.indexOf('grand')>=0&&r.indexOf('father')>=0&&r.indexOf('son')<0&&r.indexOf('daughter')<0)return{gen:0,g:'m'};
  if(r.indexOf('grand')>=0&&r.indexOf('mother')>=0&&r.indexOf('son')<0&&r.indexOf('daughter')<0)return{gen:0,g:'f'};
  if(r==='grandfather'||r==='grandpa')return{gen:0,g:'m'};
  if(r==='grandmother'||r==='grandma')return{gen:0,g:'f'};

  // ============ GEN 1: PARENTS & THEIR GENERATION ============
  // Father/Mother (direct parents)
  if(r.indexOf('papa')>=0&&r.indexOf('grand')<0)return{gen:1,g:'m'};
  if(r===('father'))return{gen:1,g:'m'};
  if(r.indexOf('father')>=0&&r.indexOf('grand')<0&&r.indexOf("'s")<0&&r.indexOf('father-in')<0&&r.indexOf('father in')<0)return{gen:1,g:'m'};
  if(r===('ma')||r===('maa')||r===('mummy'))return{gen:1,g:'f'};
  if(r===('mother'))return{gen:1,g:'f'};
  if(r.indexOf('mother')>=0&&r.indexOf('grand')<0&&r.indexOf("'s")<0&&r.indexOf('mother-in')<0&&r.indexOf('mother in')<0)return{gen:1,g:'f'};
  // Paternal uncles/aunts (father's side)
  if(r.indexOf('tau')>=0)return{gen:1,g:'m'};
  if(r.indexOf('tai')>=0&&r.indexOf('detail')<0)return{gen:1,g:'f'};
  if(r.indexOf('chacha')>=0)return{gen:1,g:'m'};
  if(r.indexOf('chachi')>=0)return{gen:1,g:'f'};
  if(r.indexOf('bua')>=0)return{gen:1,g:'f'};
  if(r.indexOf('fufa')>=0)return{gen:1,g:'m'};
  // Maternal uncles/aunts (mother's side)
  if(r.indexOf('mama')>=0&&r.indexOf('grand')<0&&r.indexOf('mami')<0)return{gen:1,g:'m'};
  if(r.indexOf('mami')>=0)return{gen:1,g:'f'};
  if(r.indexOf('mausi')>=0||r.indexOf('maasi')>=0)return{gen:1,g:'f'};
  if(r.indexOf('mausa')>=0)return{gen:1,g:'m'};
  // In-laws (spouse's parents)
  if(r.indexOf('sasur')>=0)return{gen:1,g:'m'};
  if(r.indexOf('saas')>=0||r.indexOf('sasu')>=0)return{gen:1,g:'f'};
  if(r==='uncle')return{gen:1,g:'m'};
  if(r==='aunt'||r==='aunty'||r==='auntie')return{gen:1,g:'f'};
  // Father's/Mother's siblings (longer format)
  if(r.indexOf("father's")>=0&&r.indexOf('grand')<0)return{gen:1,g:r.indexOf('sister')>=0||r.indexOf('wife')>=0?'f':'m'};
  if(r.indexOf("mother's")>=0&&r.indexOf('grand')<0)return{gen:1,g:r.indexOf('sister')>=0||r.indexOf('wife')>=0?'f':'m'};

  // ============ GEN 2: YOU & SIBLINGS ============
  if(r.indexOf('bhaiya')>=0)return{gen:2,g:'m'};
  if(r.indexOf('bhabhi')>=0)return{gen:2,g:'f'};
  if(r.indexOf('didi')>=0)return{gen:2,g:'f'};
  if(r.indexOf('jija')>=0)return{gen:2,g:'m'};
  if(r.indexOf('bhai')>=0&&r.indexOf('bhaiya')<0)return{gen:2,g:'m'};
  if(r.indexOf('behen')>=0)return{gen:2,g:'f'};
  if(r.indexOf('pati')>=0&&r.indexOf('grand')<0)return{gen:2,g:'m'};
  if(r.indexOf('patni')>=0)return{gen:2,g:'f'};
  if(r==='husband'||r==='wife'||r==='spouse')return{gen:2,g:r==='husband'?'m':'f'};
  if(r.indexOf('husband')>=0&&r.indexOf('grand')<0)return{gen:2,g:'m'};
  if(r.indexOf('wife')>=0&&r.indexOf('grand')<0)return{gen:2,g:'f'};
  if(r.indexOf('cousin')>=0)return{gen:2,g:r.indexOf('sister')>=0?'f':'m'};
  if(r.indexOf('jeth')>=0&&r.indexOf('jethani')<0)return{gen:2,g:'m'};
  if(r.indexOf('jethani')>=0)return{gen:2,g:'f'};
  if(r.indexOf('dewar')>=0&&r.indexOf('devrani')<0)return{gen:2,g:'m'};
  if(r.indexOf('devrani')>=0)return{gen:2,g:'f'};
  if(r.indexOf('nanand')>=0||r.indexOf('nanad')>=0)return{gen:2,g:'f'};
  if(r.indexOf('nandoi')>=0)return{gen:2,g:'m'};
  if(r.indexOf('saali')>=0)return{gen:2,g:'f'};
  if(r.indexOf('sadhu')>=0)return{gen:2,g:'m'};
  if(r.indexOf('saala')>=0)return{gen:2,g:'m'};
  if(r.indexOf('behnoi')>=0)return{gen:2,g:'m'};
  if(r.indexOf('brother')>=0&&r.indexOf('grand')<0&&r.indexOf("'s")<0&&r.indexOf('-in-law')<0)return{gen:2,g:'m'};
  if(r.indexOf('sister')>=0&&r.indexOf('grand')<0&&r.indexOf("'s")<0&&r.indexOf('-in-law')<0)return{gen:2,g:'f'};

  // ============ GEN 4: GRANDCHILDREN ============
  // Checked BEFORE Gen 3 deliberately: "Daughter's Son (Nati)" contains the
  // substring 'son', and "Daughter's Daughter (Natin)" contains 'daughter'
  // — so the generic Gen 3 bare 'son'/'daughter' checks below would
  // otherwise wrongly catch them first, misclassifying grandchildren as
  // children and breaking both their generation row and their parent link
  // to the actual daughter (since a same-generation link gets excluded by
  // the real-layout-parent check elsewhere).
  if(r.indexOf('pota')>=0)return{gen:4,g:'m'};
  if(r.indexOf('poti')>=0)return{gen:4,g:'f'};
  if(r.indexOf('natin')>=0)return{gen:4,g:'f'};
  if(r.indexOf('nati')>=0)return{gen:4,g:'m'};
  if(r.indexOf('grandson')>=0)return{gen:4,g:'m'};
  if(r.indexOf('granddaughter')>=0)return{gen:4,g:'f'};
  if(r.indexOf('grand')>=0&&r.indexOf('son')>=0)return{gen:4,g:'m'};
  if(r.indexOf('grand')>=0&&r.indexOf('daughter')>=0)return{gen:4,g:'f'};

  // ============ GEN 3: CHILDREN ============
  if(r.indexOf('beta')>=0&&r.indexOf('grand')<0)return{gen:3,g:'m'};
  if(r.indexOf('beti')>=0&&r.indexOf('grand')<0)return{gen:3,g:'f'};
  if(r==='son')return{gen:3,g:'m'};
  if(r==='daughter')return{gen:3,g:'f'};
  if(r.indexOf('son')>=0&&r.indexOf('grand')<0&&r.indexOf('person')<0&&r.indexOf('season')<0)return{gen:3,g:'m'};
  if(r.indexOf('daughter')>=0&&r.indexOf('grand')<0)return{gen:3,g:'f'};
  if(r.indexOf('bahu')>=0)return{gen:3,g:'f'};
  if(r.indexOf('damaad')>=0)return{gen:3,g:'m'};
  if(r.indexOf('daughter-in-law')>=0||r.indexOf('daughter in law')>=0)return{gen:3,g:'f'};
  if(r.indexOf('son-in-law')>=0||r.indexOf('son in law')>=0)return{gen:3,g:'m'};

  // ============ FRIENDS/MENTORS - separate section below tree ============
  if(r.indexOf('friend')>=0||r.indexOf('mentor')>=0)return{gen:99,g:'u'};

  // ============ OTHER - own separate section below tree, not the siblings row ============
  if(r==='other')return{gen:98,g:'u'};

  // Final fallback - log unmatched for debugging
  console.warn('UNMATCHED relationship:', rel, '-> defaulting to gen 2');
  return{gen:2,g:'u'};
}

function guessGender(name){
  if(!name)return 'm';
  var n=name.toLowerCase();
  var fh=['devi','kumari','bai','amma','priya','anjali','sita','geeta','kavita','sunita','neha','meera','pooja','sneha','nisha','prabha','rekha','lata','seema','anita','shanti','pushpa','savitri','lakshmi','radha','gita'];
  for(var i=0;i<fh.length;i++){if(n.indexOf(fh[i])>=0)return 'f';}
  return 'm';
}

// ============================================================
// AUTO-LINK RULES
// For each relationship, which relationship(s) are its natural parent?
// Returns array of candidate parent relationship keywords (in priority order).
// When multiple bonds match (e.g. two Betas), we pick the first found —
// ambiguous cases like Pota with two Betas still work, just picks one.
// ============================================================
var AUTO_PARENT_RULES = [
  // Gen 1 → Gen 0 parents
  { child: ['father (papa)','papa','father'],          parents: ['grand father (dada)','dada'] },
  { child: ['mother (ma)','mother','mummy'],parents: ['grand father (nana)','nana'] },
  { child: ['father\'s elder brother (tau)','tau'],    parents: ['grand father (dada)','dada'] },
  { child: ['father\'s elder brother\'s wife (tai)','tai'], parents: ['grand father (dada)','dada'] },
  { child: ['father\'s younger brother (chacha)','chacha'], parents: ['grand father (dada)','dada'] },
  { child: ['father\'s younger brother\'s wife (chachi)','chachi'], parents: ['grand father (dada)','dada'] },
  { child: ['father\'s sister (bua)','bua'],           parents: ['grand father (dada)','dada'] },
  { child: ['father\'s sister\'s husband (fufa)','fufa'], parents: ['grand father (dada)','dada'] },
  { child: ['mother\'s brother (mama)','mama'],        parents: ['grand father (nana)','nana'] },
  { child: ['mother\'s brother\'s wife (mami)','mami'],parents: ['grand father (nana)','nana'] },
  { child: ['mother\'s sister (mausi)','mausi'],       parents: ['grand father (nana)','nana'] },
  { child: ['mother\'s sister\'s husband (mausa)','mausa'], parents: ['grand father (nana)','nana'] },
  // Spouse-side Gen 1 → spouse's parents (sasur/saas are your spouse's parents — no auto-link up, place independently)

  // Gen 2 → Gen 1 parents
  { child: ['elder brother (bhaiya)','bhaiya','younger brother (bhai)','bhai',
            'elder sister (didi)','didi','younger sister (behen)','behen','cousin'],
            parents: ['father (papa)','papa','father'] },
  { child: ['elder brother\'s wife (bhabhi)','bhabhi'],
            parents: ['elder brother (bhaiya)','bhaiya'] },
  { child: ['elder sister\'s husband (jija)','jija'],
            parents: ['elder sister (didi)','didi'] },

  // Gen 4 → Gen 3 — placed BEFORE the Gen 3 rule below deliberately:
  // "Grandson (Pota)" contains the bare substring 'son', and "Daughter's
  // Son (Nati)" / "Daughter's Daughter (Natin)" contain 'son'/'daughter' —
  // so the more generic Gen 3 rule's bare keywords would otherwise match
  // first and wrongly resolve these grandchildren straight to You instead
  // of to their actual parent (Beta or the daughter).
  { child: ['grandson (pota)','pota','granddaughter (poti)','poti'],
            parents: ['son (beta)','beta','son'] },
  { child: ["daughter's son (nati)",'nati',"daughter's daughter (natin)",'natin'],
            parents: ['daughter (beti)','beti','daughter'] },

  // Gen 3 → Gen 2 (You or sibling)
  { child: ['son (beta)','beta','son','daughter (beti)','beti','daughter'],
            parents: ['__you__'] },  // special token = You node
  { child: ['daughter-in-law (bahu)','bahu'],
            parents: ['son (beta)','beta','son'] },
  { child: ['son-in-law (damaad)','damaad'],
            parents: ['daughter (beti)','beti','daughter'] },
];

// ============================================================
// AUTO-LINK ENGINE
// Finds the best parent bond for a given child bond automatically.
// Uses parentBondId if already set (manual override / future FlutterFlow).
// Falls back to AUTO_PARENT_RULES for all existing data.
// ============================================================
function autoLink(bonds){
  // Build lookup: normalised relationship → list of bonds with that rel
  var relIndex = {};
  var YOU_ID = '__you__';

  bonds.forEach(function(b){
    if(b._isYou) return;
    var r = (b._relDisplay||'').toLowerCase().trim();
    if(!relIndex[r]) relIndex[r] = [];
    relIndex[r].push(b);
  });

  // Build lookup: person's own name → their bond id, for explicit
  // Father's Name / Mother's Name resolution (see below).
  var nameIndex = {};
  bonds.forEach(function(b){
    if(b._isYou){ nameIndex['you']=YOU_ID; return; }
    if(b.relativename) nameIndex[b.relativename.trim().toLowerCase()] = b.id;
  });
  function findBondIdByName(name){
    if(!name || !name.trim()) return null;
    return nameIndex[name.trim().toLowerCase()] || null;
  }

  // Helper: find first bond matching any of the given keywords.
  // Two tiers: exact match (always safe), then a fuzzy substring fallback
  // for when no exact match exists. The fuzzy tier is dangerous for a
  // small set of common short words that appear as substrings inside many
  // OTHER unrelated relationship phrases — e.g. bare 'father' also matches
  // inside "grand father (nana)", bare 'son' also matches inside
  // "grandson" and "daughter's son". If a real Papa/Beta/etc. bond simply
  // doesn't exist yet, fuzzy-matching one of these words can silently
  // attach to a completely wrong person (this is exactly what caused You
  // to be wrongly linked under Nana when no Papa bond existed). These
  // words are excluded from the fuzzy tier entirely — safe for exact
  // matching, never used to guess.
  var UNSAFE_FOR_FUZZY = {father:1, mother:1, son:1, daughter:1, ma:1, maa:1, mummy:1};
  function findParent(keywords){
    for(var i=0;i<keywords.length;i++){
      var kw = keywords[i].toLowerCase();
      if(kw === '__you__') return {id: YOU_ID, _isYou: true};
      // Exact match first
      if(relIndex[kw] && relIndex[kw].length>0) return relIndex[kw][0];
      if(UNSAFE_FOR_FUZZY[kw]) continue; // never fuzzy-match these — exact only
      // Partial match fallback
      var keys = Object.keys(relIndex);
      for(var j=0;j<keys.length;j++){
        if(keys[j].indexOf(kw)>=0 && relIndex[keys[j]].length>0)
          return relIndex[keys[j]][0];
      }
    }
    return null;
  }

  bonds.forEach(function(b){
    if(b._isYou) return;
    // If parentBondId already explicitly set in Firestore, respect it
    if(b.parentBondId) return;

    // ============================================================
    // EXPLICIT PARENT NAMES — the robust, long-term resolution.
    // Relationship-type keyword matching (below) is inherently
    // ambiguous once more than one bond shares the same type — e.g.
    // with two "Daughter (Beti)" entries, a "Son-in-Law (Damaad)"
    // bond's rule-based lookup has no way to know WHICH daughter is
    // actually his wife, and can silently attach to the wrong one.
    // If this bond has an explicit fatherName/motherName (see the
    // AddRelative form), use that instead — it's exact, never
    // ambiguous, and takes priority. Only bonds where these fields
    // are left blank fall through to the keyword-based guess below,
    // so all existing data keeps working exactly as before.
    var explicitFatherId = findBondIdByName(b.fatherName);
    var explicitMotherId = findBondIdByName(b.motherName);
    if(explicitFatherId || explicitMotherId){
      b._autoParentId = explicitFatherId || explicitMotherId;
      // If BOTH parents are explicitly named and identifiable, keep
      // the other one too — used to draw a secondary connector line
      // to them as well (e.g. if father & mother aren't merged into
      // one couple-unit for some reason), same idea as the existing
      // Papa/Ma-style secondary lineage line.
      var other = explicitFatherId ? explicitMotherId : null;
      if(other && other!==b._autoParentId) b._secondaryParentId = other;
      return;
    }

    var r = (b._relDisplay||'').toLowerCase().trim();

    // Grandparents (Dada/Dadi/Nana/Nani, gen 0) are tree roots — they have
    // no parent bond in this app. Skip them entirely, otherwise the bare
    // 'father'/'mother' keyword aliases used for Rule 0/1 below would
    // falsely substring-match "grand father (nana)" / "grand mother (dadi)"
    // and wrongly link one grandparent to another — which, in the unit-
    // based layout below, can even form a parent/child CYCLE and crash
    // the page with a stack overflow.
    // NOTE: this checks the generation NUMBER, not the word "grand" in the
    // relationship string — a plain string check would also wrongly catch
    // grandCHILDREN ("Grandson (Pota)" contains "grand" too), leaving them
    // with no parent link at all.
    if(b._gen===0) return;

    // Try each rule
    for(var i=0;i<AUTO_PARENT_RULES.length;i++){
      var rule = AUTO_PARENT_RULES[i];
      var matched = false;
      for(var j=0;j<rule.child.length;j++){
        if(r === rule.child[j].toLowerCase() || r.indexOf(rule.child[j].toLowerCase())>=0){
          matched = true; break;
        }
      }
      if(matched){
        var parent = findParent(rule.parents);
        if(parent) { b._autoParentId = parent.id; }
        break;
      }
    }
  });

  // Link YOU under Papa (or Ma, if no Papa on record) so the recursive
  // tree layout naturally centers You beneath your parents instead of
  // floating as an unrelated root.
  var youBond = bonds.find(function(b){ return b._isYou; });
  if(youBond && !youBond.parentBondId && !youBond._autoParentId){
    var papaLink = findParent(['father (papa)','papa','father']);
    var maLink = papaLink ? null : findParent(['mother (ma)','ma','mother','maa','mummy']);
    var linkTo = papaLink || maLink;
    if(linkTo) youBond._autoParentId = linkTo.id;
  }
}

// ============================================================
// BRANCH ASSIGNMENT (for layout zones)
// Paternal = Papa's side, Maternal = Ma's side
// ============================================================
function assignBranches(bonds){
  // First pass: assign branch to root-level relations (grandparents, direct parents)
  // Check MATERNAL first (more specific), then PATERNAL, then SPOUSE
  // This prevents Mama/Mami/Mausi/Mausa from being caught by paternal checks
  var MATERNAL_RELS = ['nana','nani','grand father (nana)','grand mother (nani)',
    "mother's brother",'mama','mami',"mother's sister",'mausi','mausa'];
  var PATERNAL_RELS = ['dada','dadi','grand father (dada)','grand mother (dadi)',
    "father's elder brother",'tau','tai',
    "father's younger brother",'chacha','chachi',
    "father's sister",'bua','fufa',
    'father (papa)','papa'];
  var SPOUSE_RELS   = ['sasur','saas','jeth','jethani','dewar','devrani',
    'nanand','nandoi','saali','saala','sadhu','behnoi',
    'husband (pati)','wife (patni)','pati','patni','spouse'];
  // Papa/Ma/Father/Mother go under 'self' so they sit between paternal & maternal
  var SELF_PARENT_RELS = ['father (papa)','mother (ma)','papa','ma','father','mother','maa','mummy'];

  bonds.forEach(function(b){
    if(b._isYou){ b._branch='self'; return; }
    var r=(b._relDisplay||'').toLowerCase().trim();
    // Check in priority order: self-parents, maternal, paternal, spouse
    var isSelfParent = SELF_PARENT_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    var isMat = MATERNAL_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    var isPat = PATERNAL_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    var isSp  = SPOUSE_RELS.some(function(k){ return r===k||r.indexOf(k)>=0; });
    if(isSelfParent) b._branch='self';
    else if(isMat) b._branch='maternal';
    else if(isPat) b._branch='paternal';
    else if(isSp) b._branch='spouse';
    else b._branch='self';
  });

  // Second pass: propagate branch from parent → children (auto-linked or manual)
  // Children inherit their parent's branch so Chacha's children stay on paternal side
  var bondMap={};
  bonds.forEach(function(b){ bondMap[b.id]=b; });

  for(var pass=0;pass<6;pass++){
    bonds.forEach(function(b){
      if(b._isYou) return;
      var pid = b.parentBondId || b._autoParentId;
      if(!pid || pid==='__you__') return;
      var parent = bondMap[pid];
      if(parent && parent._branch && !b._branchLocked){
        b._branch = parent._branch;
        b._branchLocked = true; // don't overwrite once inherited
      }
    });
  }

  // Final fallback
  bonds.forEach(function(b){
    if(!b._branch) b._branch='self';
  });
}

var GEN_LABELS=[
  {gen:0,emoji:'👴👵',title:'Grandparents'},
  {gen:1,emoji:'👨‍👩‍👦',title:'Parents & Relatives'},
  {gen:2,emoji:'⭐',title:'You & Siblings'},
  {gen:3,emoji:'👶',title:'Children'},
  {gen:4,emoji:'🧒',title:'Grandchildren'}
];

var LEVEL_H=160,NODE_W=110,START_Y=40,BRANCH_GAP=50;

function getInitials(n){
  if(!n)return'?';
  return n.split(' ').map(function(w){return w[0]||''}).join('').substring(0,2).toUpperCase();
}

// Show a short relation word inside the circle (Papa / Ma / Nana / Chacha...)
// instead of initials, falling back to initials only when no short label
// can be determined (e.g. "Other" or a name with no relation on record).
function getShortLabel(relDisplay,name){
  if(!relDisplay) return getInitials(name);
  var m=relDisplay.match(/\(([^)]+)\)/);
  if(m&&m[1]) return m[1].trim();
  var simple=relDisplay.trim();
  if(simple&&simple.toLowerCase()!=='other'&&simple.indexOf(' ')<0&&simple.length<=10){
    return simple.charAt(0).toUpperCase()+simple.slice(1).toLowerCase();
  }
  return getInitials(name);
}

// ============================================================
// MAIN INIT
// ============================================================
async function init(){
  var urlParams=new URLSearchParams(window.location.search);
  var uid=urlParams.get('uid');
  var bonds=[];
  try{
    var q=db.collection('bonds');
    if(uid)q=q.where('userId','==',uid);
    var snap=await q.get();
    snap.forEach(function(d){bonds.push(Object.assign({id:d.id},d.data()))});
  }catch(e){console.error('Firestore error:',e)}

  var familyBonds=[];
  var otherBonds=[];
  var friendBonds=[];
  bonds.forEach(function(b){
    var relField=b.relationship||b.testRelation||'';
    var c=classify(relField);
    console.log('Bond:', b.relativename, '| rel:', relField, '| gen:', c.gen, '| gender:', c.g);
    b._gen=c.gen;
    b._g=c.g==='u'?guessGender(b.relativename):c.g;
    b._relDisplay=relField;
    if(c.gen===99) friendBonds.push(b);        // Friends & Mentors — separate section
    else if(c.gen===98) otherBonds.push(b);    // "Other" — its own separate section, not the siblings row
    else familyBonds.push(b);                  // Gen 0-4 — the generational tree
  });

  if(familyBonds.length===0 && otherBonds.length===0 && friendBonds.length===0){showEmpty();return;}

  if(familyBonds.length>0){
    // Insert YOU node
    var youNode={_isYou:true,id:'__you__',relativename:'You',_gen:2,_g:'m',_relDisplay:'',_branch:'self'};
    familyBonds.unshift(youNode);

    // Auto-link: assign _autoParentId based on relationship rules
    autoLink(familyBonds);

    // Assign branches (paternal/maternal/self/spouse)
    assignBranches(familyBonds);

    renderTree(familyBonds);
  } else {
    showEmpty(true); // show empty family state but still render Other/Friends below
  }

  renderOthers(otherBonds);
  renderFriends(friendBonds);
  document.getElementById('loader').classList.add('hidden');
}

// RENDER "OTHER" RELATIONS — separate section below the tree,
// same treatment as Friends & Mentors, so an unclassified "Other"
// relation no longer sits awkwardly in the siblings row.
// ============================================================
function renderOthers(others){
  var existing=document.getElementById('othersSection');
  if(existing) existing.remove();

  if(!others || others.length===0) return;

  var section=document.createElement('div');
  section.id='othersSection';
  section.className='friends-section';

  var header=document.createElement('div');
  header.className='friends-header';
  header.innerHTML='\uD83D\uDC65 Other Relations';
  section.appendChild(header);

  var row=document.createElement('div');
  row.className='friends-row';

  others.forEach(function(f){
    var g=guessGender(f.relativename);
    var card=document.createElement('div');
    card.className='friend-card';
    card.onclick=function(){showPopup(Object.assign({},f,{_g:g}));};
    card.innerHTML=
      '<div class="friend-circle '+(g==='f'?'female':'male')+'">'+getInitials(f.relativename||'?')+'</div>'+
      '<div class="friend-name">'+(f.relativename||'?')+'</div>'+
      '<div class="friend-tag">\uD83D\uDC65 Other</div>'+
      (f.location?'<div class="friend-location">\uD83D\uDCCD '+f.location+'</div>':'');
    row.appendChild(card);
  });

  section.appendChild(row);

  var viewport=document.getElementById('viewport');
  viewport.appendChild(section);
}

// ============================================================
// RENDER TREE
// ============================================================
function renderTree(bonds){
  var canvas=document.getElementById('canvas');
  var svg=document.getElementById('svgLayer');
  var byId={}; bonds.forEach(function(b){ byId[b.id]=b; });
  var youEl=byId['__you__'];

  // ============================================================
  // STEP 1: Work out marriage pairs (who is coupled with whom)
  // ============================================================
  var spouseOf={};
  function tryPair(a,b){
    if(!a||!b||a.id===b.id)return;
    if(spouseOf[a.id]||spouseOf[b.id])return;
    spouseOf[a.id]=b.id; spouseOf[b.id]=a.id;
  }
  bonds.forEach(function(a){
    if(spouseOf[a.id]||!a.marriedTo||!a.marriedTo.trim())return;
    var sn=a.marriedTo.trim().toLowerCase();
    var match=bonds.find(function(b){
      return b.id!==a.id&&!spouseOf[b.id]&&(b.relativename||'').trim().toLowerCase()===sn;
    });
    if(match)tryPair(a,match);
  });
  // Fallback: You's spouse identified purely by relationship keyword
  // (Pati/Patni/Husband/Wife) even if marriedTo names weren't filled in
  if(youEl&&!spouseOf[youEl.id]){
    var s=bonds.find(function(b){
      if(b._isYou||spouseOf[b.id])return false;
      var r=(b._relDisplay||'').toLowerCase();
      return r.indexOf('pati')>=0||r.indexOf('patni')>=0||r==='husband'||r==='wife'||r==='spouse'||r.indexOf('husband')>=0||r.indexOf('wife')>=0;
    });
    if(s)tryPair(youEl,s);
  }

  // ============================================================
  // STEP 2: Build "units" — a single person, or a married couple
  // rendered as one side-by-side pair — since a couple should
  // always move and center together as one branch node.
  // ============================================================
  var unitOf={};
  var units=[];
  bonds.forEach(function(b){
    if(unitOf[b.id])return;
    var partner=spouseOf[b.id]?byId[spouseOf[b.id]]:null;
    var primary=b, secondary=partner;
    if(partner&&partner._g==='m'&&b._g==='f'){ primary=partner; secondary=b; }
    var unit={id:'u_'+primary.id,members:[primary].concat(secondary?[secondary]:[]),gen:primary._gen,branch:primary._branch};
    unitOf[primary.id]=unit;
    if(secondary)unitOf[secondary.id]=unit;
    units.push(unit);
  });

  // ============================================================
  // STEP 3: Link units to their parent unit (using the same
  // parentBondId / autoParentId already computed by autoLink()).
  // This is what actually produces distinct branches — every
  // person's horizontal position will come from their real
  // ancestor, not just "which generation row am I in".
  // ============================================================
  var unitById={}; units.forEach(function(u){unitById[u.id]=u;});
  units.forEach(function(u){
    // A couple can have TWO different resolved parent links (e.g. Didi's
    // own link to Papa, and her husband Jija's rule-based link to "Didi"
    // herself — modeled that way purely so a connector ties him to her).
    // Blindly using only members[0]'s link is wrong: if he happens to be
    // primary, his same-generation/self-referencing link would silently
    // override her genuinely valid one, leaving the couple with no real
    // parent at all. Check both members and use whichever link actually
    // points to a different unit at a strictly earlier generation.
    function validParentUnitId(member){
      var pid=member.parentBondId||member._autoParentId;
      if(!pid)return null;
      var ref=unitOf[pid];
      if(!ref||ref.id===u.id)return null;   // no link, or a self-reference
      if(!(ref.gen<u.gen))return null;      // must be a genuine generation above
      return ref.id;
    }
    u.parentUnitId = validParentUnitId(u.members[0]) || (u.members[1]?validParentUnitId(u.members[1]):null);
  });

  // Defensive cycle guard: bad/unexpected data could in theory link two
  // units as each other's ancestor (directly, or through a longer chain).
  // layoutUnit() below recurses through parentUnitId -> children, so any
  // cycle would recurse forever and crash the page (stack overflow). Walk
  // every unit's ancestor chain here and sever any link that would loop
  // back to a unit already seen — this guarantees layoutUnit() always
  // terminates, no matter what the underlying relationship data looks like.
  units.forEach(function(u){
    var seen={}; seen[u.id]=true;
    var cur=u;
    while(cur.parentUnitId){
      if(seen[cur.parentUnitId]){ cur.parentUnitId=null; break; }
      seen[cur.parentUnitId]=true;
      cur=unitById[cur.parentUnitId];
      if(!cur) break;
    }
  });

  // Only treat parentUnitId as a real LAYOUT parent (positions the unit
  // as a descendant below) when it's genuinely a generation above. Some
  // rules (e.g. Bhabhi modeled as a 'child' of Bhaiya, Jija of Didi) link
  // a same-generation spouse this way purely so a connector line ties them
  // together — but as a real layout parent, a unit with exactly one such
  // "child" centers itself directly on top of it, causing them to overlap.
  // Those same-gen links are dropped here; the existing marriage-connector
  // logic (marriedTo match, or the Pati/Patni keyword fallback) is what
  // actually pairs and positions real spouses side by side.
  function isRealLayoutParent(u){
    if(!u.parentUnitId) return false;
    var parent=unitById[u.parentUnitId];
    return !!(parent && u.gen>parent.gen);
  }

  var childrenOf={};
  units.forEach(function(u){
    if(isRealLayoutParent(u)){
      if(!childrenOf[u.parentUnitId])childrenOf[u.parentUnitId]=[];
      childrenOf[u.parentUnitId].push(u);
    }
  });

  // Cluster simple siblings (no descendants of their own) together right
  // next to their parent, and push any sibling who themselves has a wide
  // subtree to the end. Without this, a sibling processed early in the
  // recursion (e.g. "You", who may have several children) can consume a
  // large stretch of horizontal space, shoving every later-processed
  // sibling far away and making them look stranded on a wide canvas.
  Object.keys(childrenOf).forEach(function(pid){
    childrenOf[pid].sort(function(a,b){
      var aLeaf=childrenOf[a.id]?1:0, bLeaf=childrenOf[b.id]?1:0;
      return aLeaf-bLeaf;
    });
  });

  // Roots = units with no genuine layout parent above them (grandparents,
  // same-generation spouse-links like Bhabhi/Jija that got excluded above,
  // or any orphaned record). Order roots Papa's-side first, then anything
  // unbranched, then Mama's-side last, so the two ancestries fan out
  // as clearly separated left/right branches instead of one long row.
  var roots=units.filter(function(u){return !isRealLayoutParent(u);});
  var branchRank={paternal:0,self:1,spouse:1,maternal:2};
  roots.sort(function(a,b){
    var ra=branchRank[a.branch]!=null?branchRank[a.branch]:1;
    var rb=branchRank[b.branch]!=null?branchRank[b.branch]:1;
    return ra-rb;
  });

  // ============================================================
  // STEP 4: Recursive tree layout — every unit's X position is
  // centered directly above the midpoint of its own children,
  // and leaf units simply take the next open horizontal slot.
  // This is what creates real tree branches (each ancestor sits
  // above their own descendants) instead of a single flat row.
  // ============================================================
  var UNIT_GAP=26,SIB_GAP=34,ROOT_GAP=90,nextX=20;
  function unitWidth(u){ return u.members.length>1?(NODE_W*2+UNIT_GAP):NODE_W; }
  function layoutUnit(u){
    var kids=(childrenOf[u.id]||[]);
    if(kids.length===0){
      u._x=nextX;
      nextX+=unitWidth(u)+SIB_GAP;
    }else{
      kids.forEach(layoutUnit);
      u._x=(kids[0]._x+kids[kids.length-1]._x)/2;
    }
  }
  roots.forEach(function(r){ layoutUnit(r); nextX+=ROOT_GAP; });
  // Safety net for any unit not reached from a root (shouldn't normally happen)
  units.forEach(function(u){ if(u._x===undefined){ layoutUnit(u); nextX+=ROOT_GAP; } });

  // ============================================================
  // STEP 5: Expand each unit's X into real node X/Y coordinates
  // ============================================================
  var allNodes=[]; var maxX=0;
  units.forEach(function(u){
    var y=START_Y+u.gen*LEVEL_H;
    if(u.members.length>1){
      // Total couple width = NODE_W*2+UNIT_GAP (matches unitWidth()), centered on u._x
      var leftX=u._x-NODE_W-UNIT_GAP/2;
      var rightX=u._x+UNIT_GAP/2;
      u.members[0]._x=leftX; u.members[0]._y=y;
      u.members[1]._x=rightX; u.members[1]._y=y;
    }else{
      u.members[0]._x=u._x-NODE_W/2; u.members[0]._y=y;
    }
    u.members.forEach(function(m){ allNodes.push(m); });
  });

  // Safety pass: the recursive centering above can occasionally place two
  // nodes from unrelated branches closer than a node's actual width (e.g. a
  // parent centered over a single child can shift closer to a neighboring
  // branch than intended). Rather than trying to perfectly model every
  // possible tree shape, guarantee the result visually here: within each
  // row (same generation), sort left-to-right and push any node that's
  // closer than a safe minimum distance to its left neighbor further
  // right — carrying that shift forward so order is preserved and no new
  // overlap is introduced later in the same row.
  var MIN_NODE_GAP=96; // node div is 90px wide; keeps a small visual margin
  var byY={};
  allNodes.forEach(function(n){ (byY[n._y]=byY[n._y]||[]).push(n); });
  Object.keys(byY).forEach(function(y){
    var row=byY[y].sort(function(a,b){return a._x-b._x;});
    for(var i=1;i<row.length;i++){
      var minX=row[i-1]._x+MIN_NODE_GAP;
      if(row[i]._x<minX) row[i]._x=minX;
    }
  });

  // Normalize: if a couple happens to be the very first unit laid out,
  // centering it on a small starting x can push its left member to a
  // negative x (off-canvas, inaccessible). Shift every node right by
  // whatever amount is needed so the leftmost node sits at a safe margin.
  var minNodeX=0;
  allNodes.forEach(function(n){ if(n._x<minNodeX) minNodeX=n._x; });
  if(minNodeX<20){
    var shift=20-minNodeX;
    allNodes.forEach(function(n){ n._x+=shift; });
  }

  allNodes.forEach(function(m){ if(m._x+NODE_W>maxX)maxX=m._x+NODE_W; });

  var maxGen=0; allNodes.forEach(function(n){ if(n._gen>maxGen)maxGen=n._gen; });
  var maxY=START_Y+maxGen*LEVEL_H+140;
  canvas.style.width=(maxX+60)+'px';
  canvas.style.height=maxY+'px';
  svg.setAttribute('width',maxX+60);
  svg.setAttribute('height',maxY);

  var svgHtml='';

  // ============================================================
  // MARRIAGE CONNECTORS — one per unit that has two members
  // ============================================================
  units.forEach(function(u){
    if(u.members.length<2)return;
    var a=u.members[0], b=u.members[1];
    var y=a._y+27;
    var x1=Math.min(a._x,b._x)+NODE_W-4, x2=Math.max(a._x,b._x)+4;
    if(x2>x1){
      svgHtml+='<line class="conn-mar" x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'"/>';
      var heart=document.createElement('div');heart.className='heart-badge';
      heart.textContent='\u2665';
      heart.style.left=((a._x+b._x)/2+NODE_W/2-9)+'px'; heart.style.top=(y-9)+'px';
      canvas.appendChild(heart);
    }
  });

  // ============================================================
  // PARENT-CHILD CONNECTORS — one per unit with a resolved parent
  // ============================================================
  units.forEach(function(u){
    if(!isRealLayoutParent(u))return;
    var parentUnit=unitById[u.parentUnitId];
    if(!parentUnit)return;
    var pAnchorX=parentUnit.members.length>1
      ?(parentUnit.members[0]._x+parentUnit.members[1]._x)/2+NODE_W/2
      :parentUnit.members[0]._x+NODE_W/2;
    var py=parentUnit.members[0]._y+60;
    var cAnchorX=u.members.length>1
      ?(u.members[0]._x+u.members[1]._x)/2+NODE_W/2
      :u.members[0]._x+NODE_W/2;
    var cy=u.members[0]._y-4;
    var my=py+(cy-py)*0.45;
    svgHtml+='<path class="conn-pc" d="M'+pAnchorX+','+py+' L'+pAnchorX+','+my+' L'+cAnchorX+','+my+' L'+cAnchorX+','+cy+'"/>';
  });

  // ============================================================
  // SECONDARY PARENT CONNECTOR — when a couple is one unit (e.g. Papa +
  // Ma), only the PRIMARY member's own lineage (Papa -> Dada) is used to
  // position and connect the unit. The other spouse's own parents (Ma's
  // own link to Nana/Nani) would otherwise never be shown at all. Draw a
  // distinctly-styled second connector from that side's real ancestor
  // down to the couple, so Ma's own lineage to Nana/Nani is still visible
  // even though her position is anchored next to Papa, not under Nana.
  // ============================================================
  units.forEach(function(u){
    if(u.members.length<2)return;
    var secondary=u.members[1];
    var pid=secondary.parentBondId||secondary._autoParentId;
    if(!pid||pid==='__you__')return;
    var secParentUnitRef=unitOf[pid];
    if(!secParentUnitRef)return;
    var parentUnit=unitById[secParentUnitRef.id];
    if(!parentUnit)return;
    if(!(u.gen>parentUnit.gen))return;      // must be a genuine generation-up link
    if(parentUnit.id===u.parentUnitId)return; // same as primary's own parent already drawn above
    var pAnchorX=parentUnit.members.length>1
      ?(parentUnit.members[0]._x+parentUnit.members[1]._x)/2+NODE_W/2
      :parentUnit.members[0]._x+NODE_W/2;
    var py=parentUnit.members[0]._y+60;
    var cAnchorX=secondary._x+NODE_W/2;
    var cy=secondary._y-4;
    var my=py+(cy-py)*0.45;
    svgHtml+='<path class="conn-pc conn-pc-secondary" d="M'+pAnchorX+','+py+' L'+pAnchorX+','+my+' L'+cAnchorX+','+my+' L'+cAnchorX+','+cy+'"/>';
  });

  // ============================================================
  // SECONDARY PARENT CONNECTOR (explicit) — when BOTH Father's Name and
  // Mother's Name were explicitly provided on a bond and both resolved to
  // real people, but they aren't merged into one couple-unit (e.g. the
  // two parents aren't linked via marriedTo, or one is a step-parent).
  // Draws a second connector to whichever parent wasn't used as the
  // primary layout link, so both named parents are visibly connected.
  // ============================================================
  units.forEach(function(u){
    u.members.forEach(function(m){
      var pid=m._secondaryParentId;
      if(!pid||pid==='__you__')return;
      var secParentUnitRef=unitOf[pid];
      if(!secParentUnitRef)return;
      var parentUnit=unitById[secParentUnitRef.id];
      if(!parentUnit)return;
      if(!(u.gen>parentUnit.gen))return;
      if(parentUnit.id===u.parentUnitId)return;
      var pAnchorX2=parentUnit.members.length>1
        ?(parentUnit.members[0]._x+parentUnit.members[1]._x)/2+NODE_W/2
        :parentUnit.members[0]._x+NODE_W/2;
      var py2=parentUnit.members[0]._y+60;
      var cAnchorX2=m._x+NODE_W/2;
      var cy2=m._y-4;
      var my2=py2+(cy2-py2)*0.45;
      svgHtml+='<path class="conn-pc conn-pc-secondary" d="M'+pAnchorX2+','+py2+' L'+pAnchorX2+','+my2+' L'+cAnchorX2+','+my2+' L'+cAnchorX2+','+cy2+'"/>';
    });
  });

  svg.innerHTML=svgHtml;

  // Generation stripe labels
  GEN_LABELS.forEach(function(gl){
    var members=allNodes.filter(function(n){return n._gen===gl.gen;});
    if(members.length===0&&gl.gen!==2)return;
    var stripe=document.createElement('div');stripe.className='gen-stripe';
    stripe.style.top=(START_Y+gl.gen*LEVEL_H-28)+'px';
    stripe.innerHTML='<span>'+gl.emoji+' '+gl.title+'</span>';
    canvas.appendChild(stripe);
  });

  // Branch labels above Gen 0 if both sides present
  var gen0=allNodes.filter(function(n){return n._gen===0;});
  var patG0=gen0.filter(function(n){return n._branch==='paternal';});
  var matG0=gen0.filter(function(n){return n._branch==='maternal';});
  if(patG0.length){
    var minX=Math.min.apply(null,patG0.map(function(n){return n._x;}));
    var bl=document.createElement('div');bl.className='branch-label';
    bl.textContent="Papa's side \ud83c\udfe0";
    bl.style.left=minX+'px'; bl.style.top=(START_Y-46)+'px';
    canvas.appendChild(bl);
  }
  if(matG0.length){
    var minX2=Math.min.apply(null,matG0.map(function(n){return n._x;}));
    var bl2=document.createElement('div');bl2.className='branch-label';
    bl2.textContent="Mama's side \ud83c\udfe0";
    bl2.style.left=minX2+'px'; bl2.style.top=(START_Y-46)+'px';
    canvas.appendChild(bl2);
  }

  // Draw person nodes
  allNodes.forEach(function(m){
    var node=document.createElement('div');node.className='node';
    node.style.left=m._x+'px';node.style.top=m._y+'px';
    node.onclick=function(){showPopup(m);};
    var isYou=m._isYou;
    var cc=isYou?'you-node':(m._g==='f'?'female':'male');
    var dn=m.relativename||'?';
    var label=isYou?'\u2605YOU':getShortLabel(m._relDisplay,dn);
    var dr=m._relDisplay||'';
    node.innerHTML=
      '<div class="node-circle '+cc+'">'+label+'</div>'+
      '<div class="node-name">'+dn+'</div>'+
      (dr?'<div class="node-relation">'+dr+'</div>':'')+
      (m.location?'<div class="node-location">\ud83d\udccd '+m.location+'</div>':'')+
      (m.marriedTo?'<div class="node-married">\u2665 '+m.marriedTo+'</div>':'');
    canvas.appendChild(node);
  });

  // Auto-scroll so YOU lands centered in the viewport on load,
  // instead of the person having to hunt for themselves in the tree.
  setTimeout(function(){
    var viewport=document.getElementById('viewport');
    var youUnit=unitOf['__you__'];
    if(youUnit&&viewport){
      var cx=youUnit.members.length>1
        ?(youUnit.members[0]._x+youUnit.members[1]._x)/2+NODE_W/2
        :youUnit.members[0]._x+NODE_W/2;
      var cy=youUnit.members[0]._y;
      viewport.scrollLeft=Math.max(0,cx-viewport.clientWidth/2);
      viewport.scrollTop=Math.max(0,cy-viewport.clientHeight/2+52);
    }
  },80);
}
function showEmpty(familyOnlyEmpty){
  if(familyOnlyEmpty){
    var canvas=document.getElementById('canvas');
    canvas.style.minHeight='200px';
    var msg=document.createElement('div');
    msg.style.cssText='padding:60px 20px;text-align:center';
    msg.innerHTML='<div style="font-size:40px;margin-bottom:10px">\uD83C\uDF33</div>'+
      '<p style="font-size:13px;color:#5A4A3A">No family members added yet. Tap + below to start.</p>';
    canvas.appendChild(msg);
    return;
  }
  document.getElementById('viewport').innerHTML=
    '<div class="empty-state"><div class="emoji">🌳</div>'+
    '<h2>Your Family Tree is Empty</h2>'+
    '<p>Start building your tree by adding<br>your first family member!</p>'+
    '<p style="font-size:13px;color:#C0392B;font-weight:600">Tap + below to add your first member</p></div>';
  document.getElementById('loader').classList.add('hidden');
}

function showPopup(p){
  if(p._isYou)return;
  document.getElementById('pAvatar').style.background=p._g==='f'?'#E91E63':'#2980B9';
  document.getElementById('pAvatar').textContent=getInitials(p.relativename||'');
  document.getElementById('pName').textContent=p.relativename||'';
  document.getElementById('pRelation').textContent=p._relDisplay||'';
  var rows='';
  if(p.profession)rows+='<div class="popup-row"><span class="popup-icon">\uD83D\uDCBC</span>'+p.profession+'</div>';
  if(p.location)rows+='<div class="popup-row"><span class="popup-icon">\uD83D\uDCCD</span>'+p.location+'</div>';
  if(p.relativePhone)rows+='<div class="popup-row"><span class="popup-icon">\uD83D\uDCDE</span>'+p.relativePhone+'</div>';
  if(p.marriedTo)rows+='<div class="popup-row"><span class="popup-icon">\u2665</span>Married to: '+p.marriedTo+'</div>';
  if(!rows)rows='<div class="popup-row" style="justify-content:center;color:#bbb">No details added yet</div>';
  document.getElementById('pRows').innerHTML=rows;
  document.getElementById('overlay').classList.add('active');
}

// ============================================================
// DRAGGABLE LEGEND
// Supports both touch (mobile) and mouse (desktop/testing)
// ============================================================
(function(){
  var el=document.getElementById('legend');
  var dragging=false,startX,startY,origLeft,origTop;

  function getPos(e){
    if(e.touches) return{x:e.touches[0].clientX,y:e.touches[0].clientY};
    return{x:e.clientX,y:e.clientY};
  }
  function onStart(e){
    dragging=true;
    var pos=getPos(e);
    var rect=el.getBoundingClientRect();
    startX=pos.x; startY=pos.y;
    origLeft=rect.left; origTop=rect.top;
    el.style.bottom='auto'; el.style.right='auto';
    el.style.left=origLeft+'px'; el.style.top=origTop+'px';
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    var pos=getPos(e);
    var dx=pos.x-startX, dy=pos.y-startY;
    var newLeft=origLeft+dx, newTop=origTop+dy;
    // Keep within viewport
    newLeft=Math.max(4,Math.min(window.innerWidth-el.offsetWidth-4,newLeft));
    newTop=Math.max(56,Math.min(window.innerHeight-el.offsetHeight-4,newTop));
    el.style.left=newLeft+'px'; el.style.top=newTop+'px';
    e.preventDefault();
  }
  function onEnd(){ dragging=false; }

  el.addEventListener('touchstart',onStart,{passive:false});
  el.addEventListener('touchmove',onMove,{passive:false});
  el.addEventListener('touchend',onEnd);
  el.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
})();
